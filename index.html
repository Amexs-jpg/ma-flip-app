<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder - Resale</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .header { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: #d4ff3f; }
        .badge { background: #d4ff3f; color: black; padding: 5px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        
        .filters { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 20px; 
            background: #1e1e1e; 
            padding: 15px; 
            border-radius: 10px;
        }
        .filter-group label { display: block; font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        select { 
            width: 100%; 
            background: #2a2a2a; 
            color: white; 
            border: 1px solid #333; 
            padding: 10px; 
            border-radius: 5px; 
        }
        
        .btn-scanner {
            background: #d4ff3f;
            color: black;
            width: 100%;
            border: none;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #results { margin-top: 30px; }
        .error-container { text-align: center; margin-top: 50px; }
        .error-icon { color: #ffcc00; font-size: 50px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo"><span>Flip</span>Finder</div>
        <div class="badge">IA<br>POWERED</div>
    </div>
    <p style="font-size: 12px; color: #666; margin-top: 5px;">Détecteur d'opportunités · Liens directs Vinted</p>

    <div class="filters">
        <div class="filter-group">
            <label>Marque</label>
            <select id="marque">
                <option>Toutes (sélectionner)</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Budget Max d'achat</label>
            <select id="budget">
                <option>Jusqu'à 30€</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Type de vêtements</label>
            <select id="type">
                <option>Tous</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Taille</label>
            <select id="taille">
                <option>Toutes</option>
            </select>
        </div>
    </div>

    <button class="btn-scanner" onclick="lancerScan()">🔍 SCANNER</button>

    <div id="results"></div>

    <script>
        function lancerScan() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = "Chargement...";

            // Simulation d'un appel API (remplace par ton vrai fetch)
            fetchDataFromServer()
                .then(data => {
                    renderResults(data);
                })
                .catch(err => {
                    showError("Erreur lors de la récupération des données.");
                });
        }

        function renderResults(produits) {
            const resultsDiv = document.getElementById('results');
            
            // LA CORRECTION EST ICI : 
            // On utilise (produits || []) pour s'assurer que .map() ne tourne pas sur du vide
            // On ajoute aussi le "?" (optional chaining) par sécurité
            if (!produits || produits.length === 0) {
                showError("Aucun produit trouvé.");
                return;
            }

            resultsDiv.innerHTML = produits?.map(p => `
                <div style="background:#1e1e1e; padding:10px; margin-bottom:10px; border-radius:5px;">
                    ${p.nom} - <strong>${p.prix}€</strong>
                </div>
            `).join('');
        }

        function showError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="error-container">
                    <div class="error-icon">⚠️</div>
                    <h2>Erreur</h2>
                    <p style="color: #ff4444;">${message}</p>
                </div>
            `;
        }

        // Simulation de fonction API
        async function fetchDataFromServer() {
            // Dans ton vrai code, cette partie peut parfois renvoyer 'undefined'
            // d'où le crash que tu avais.
            return undefined; // Simule l'erreur actuelle pour test
        }
    </script>
</body>
</html>
