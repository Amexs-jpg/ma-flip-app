<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro - Hot-List V3.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505; --surface: #111; --card: #181818; --border: #282828;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #888; --score-a: #d4ff3f; --score-b: #f1a435; --score-c: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 24px 20px 80px; max-width: 600px; margin: auto;
        }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 2px; color: var(--accent); }
        .logo span { color: var(--text); }
        .badge { background: rgba(212, 255, 63, 0.1); color: var(--accent); font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--accent); }

        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        input, select {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 14px; border-radius: 12px; font-size: 13px; outline: none; transition: 0.2s;
            appearance: none;
        }
        input:focus, select:focus { border-color: var(--accent); background: #1c1c1c; }

        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 18px;
            border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .stats-bar { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin: 24px 0; overflow: hidden; }
        .stat { flex: 1; padding: 16px; border-right: 1px solid var(--border); text-align: center; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); }
        .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; margin-bottom: 16px; overflow: hidden; position: relative; animation: slideUp 0.4s ease both; }
        .grade-badge { position: absolute; top: 12px; right: 12px; width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; z-index: 10; font-weight: bold; }
        .grade-a { background: var(--score-a); color: #000; box-shadow: 0 0 20px rgba(212,255,63,0.3); }
        .grade-b { background: var(--score-b); color: #000; }

        .card-top { display: flex; padding: 15px; gap: 16px; }
        .card-photo { width: 105px; height: 135px; background: #111; border-radius: 14px; overflow: hidden; flex-shrink: 0; }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        .card-photo img.loaded { opacity: 1; }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-tag { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .card-title { font-size: 14px; font-weight: 600; color: #eee; margin-bottom: 6px; line-height: 1.2; }
        
        .price-box { display: flex; align-items: baseline; gap: 8px; }
        .buy-price { font-family: 'Bebas Neue', sans-serif; color: #666; text-decoration: line-through; font-size: 1.1rem; }
        .sell-price { font-family: 'Bebas Neue', sans-serif; color: #fff; font-size: 1.8rem; }

        .profit-tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(212, 255, 63, 0.08); color: var(--accent); padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-top: 8px; border: 1px solid rgba(212, 255, 63, 0.2); }

        .card-footer { padding: 12px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .btn-action { flex: 1.2; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-vinted { background: var(--vinted); color: white; }

        .compare-dropdown { flex: 1; position: relative; }
        .select-compare {
            width: 100%; height: 100%; padding: 12px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ccc;
            font-size: 10px; font-weight: 700; cursor: pointer; appearance: none;
            text-align: center; outline: none;
        }
        .dropdown-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #666; }

        .loading { display: none; text-align: center; padding: 40px; color: var(--muted); font-size: 12px; }
        .loading.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge">V3.5 BEST-SELLERS ONLY</div>
</div>

<div class="filters">
    <div class="filter-group">
        <label><i data-lucide="tag" size="12"></i> Marque</label>
        <input type="text" id="marque" value="Carhartt">
    </div>
    <div class="filter-group">
        <label><i data-lucide="wallet" size="12"></i> Budget Max</label>
        <input type="text" id="budget" value="70€">
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="layers" size="12"></i> Catégorie</label>
        <select id="typeSelect">
            <option value="outerwear">Vestes & Blousons (Best-sellers)</option>
            <option value="tops">Hauts & Pulls (Plus demandés)</option>
            <option value="bottoms">Pantalons & Jeans (Hot-list)</option>
            <option value="sneakers">Sneakers (Cotes Vinted)</option>
        </select>
    </div>
    <div class="filter-group">
        <label><i data-lucide="maximize" size="12"></i> Taille</label>
        <input type="text" id="taille" value="XL">
    </div>
    <div class="filter-group">
        <label><i data-lucide="sparkles" size="12"></i> État</label>
        <select id="condition">
            <option value="very_good">Très bon état</option>
            <option value="new">Neuf avec étiquette</option>
        </select>
    </div>
</div>

<button class="btn-scan" id="scanBtn" onclick="lancerScan()">
    <i data-lucide="zap" size="18"></i> SCANNER LES BEST-SELLERS
</button>

<div class="loading" id="loading">Analyse des articles à forte rotation...</div>

<div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Pépites</div></div>
    <div class="stat"><div class="stat-val" id="statProfit">0€</div><div class="stat-label">Gain Moyen</div></div>
</div>

<div id="results"></div>

<script>
lucide.createIcons();

// FOCUS BEST-SELLERS PAR CATÉGORIE
const hotDatabase = {
    "CARHARTT": {
        "outerwear": [{n:"Detroit Jacket", m:2.9, hot:true}, {n:"Santa Fe Jacket", m:2.6, hot:true}, {n:"Active Jacket Polaire", m:2.0, hot:true}],
        "tops": [{n:"Hoodie Chase Brodé", m:1.8, hot:false}, {n:"Sweat à capuche Logo Central", m:2.2, hot:true}],
        "bottoms": [{n:"Double Knee Pant", m:2.5, hot:true}, {n:"Carpenter Baggy Pant", m:2.1, hot:true}]
    },
    "NIKE": {
        "outerwear": [{n:"Veste Nocta", m:2.1, hot:true}, {n:"Windrunner Vintage", m:1.9, hot:false}],
        "tops": [{n:"Hoodie Swoosh Central", m:2.7, hot:true}, {n:"Sweat Vintage Big Logo", m:2.4, hot:true}],
        "sneakers": [{n:"Dunk Low Retro", m:1.6, hot:true}, {n:"Jordan 1 Retro High", m:2.0, hot:true}, {n:"TN Air Max Plus", m:1.8, hot:true}]
    },
    "DEFAULT": {
        "outerwear": [{n:"Veste Bomber Vintage", m:1.8, hot:true}],
        "tops": [{n:"Hoodie Oversized Heavy", m:1.7, hot:true}],
        "bottoms": [{n:"Baggy Denim 90s", m:1.9, hot:true}]
    }
};

function lancerScan() {
    const marque = document.getElementById('marque').value.toUpperCase().trim();
    const cat = document.getElementById('typeSelect').value;
    const budget = parseInt(document.getElementById('budget').value) || 50;
    const taille = document.getElementById('taille').value;

    document.getElementById('results').innerHTML = '';
    document.getElementById('loading').classList.add('active');

    const db = hotDatabase[marque] || hotDatabase["DEFAULT"];
    const models = db[cat] || hotDatabase["DEFAULT"][cat] || [{n:"Item Hype", m:1.6, hot:true}];

    setTimeout(() => {
        const items = models.map((m, i) => {
            const buy = Math.floor(budget * (0.6 + Math.random() * 0.4));
            const sell = Math.floor(buy * m.m);
            const profit = Math.round(sell - buy - (0.7 + buy * 0.05));
            return {
                title: `${marque} ${m.n}`,
                buy, sell, profit, grade: m.hot ? 'A' : 'B',
                photo: `https://picsum.photos/seed/${m.n}${i}/220/280`
            };
        });

        render(items, taille, budget);
        document.getElementById('loading').classList.remove('active');
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('statCount').textContent = items.length;
        document.getElementById('statProfit').textContent = Math.round(items.reduce((a, b) => a + b.profit, 0) / items.length) + "€";
    }, 800);
}

function openCompare(site, q) {
    const url = site === 'lbc' ? `https://www.leboncoin.fr/recherche?text=${encodeURIComponent(q)}` :
                site === 'ebay' ? `https://www.ebay.fr/sch/i.html?_nkw=${encodeURIComponent(q)}` :
                `https://stockx.com/fr-fr/search?s=${encodeURIComponent(q)}`;
    window.open(url, '_blank');
}

function render(items, taille, budget) {
    const container = document.getElementById('results');
    items.forEach((item, i) => {
        const q = `${item.title} ${taille}`;
        const vinted = `https://www.vinted.fr/catalog?search_text=${encodeURIComponent(q)}&price_to=${budget}&order=newest_first`;
        container.innerHTML += `
            <div class="card">
                <div class="grade-badge grade-${item.grade.toLowerCase()}">${item.grade}</div>
                <div class="card-top">
                    <div class="card-photo"><img src="${item.photo}" onload="this.classList.add('loaded')"></div>
                    <div class="card-info">
                        <div class="card-tag">TOP VENTE</div>
                        <div class="card-title">${item.title}</div>
                        <div class="price-box"><span class="buy-price">${item.buy}€</span> <i data-lucide="arrow-right" size="14"></i> <span class="sell-price">${item.sell}€</span></div>
                        <div class="profit-tag"><i data-lucide="flame" size="12"></i> BÉNÉFICE : +${item.profit}€</div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="${vinted}" target="_blank" class="btn-action btn-vinted">VINTED</a>
                    <div class="compare-dropdown">
                        <select class="select-compare" onchange="openCompare(this.value, '${q}'); this.value='';">
                            <option value="" disabled selected>COMPARER</option>
                            <option value="lbc">LEBONCOIN</option>
                            <option value="ebay">EBAY</option>
                        </select>
                        <i data-lucide="chevron-down" size="14" class="dropdown-icon"></i>
                    </div>
                </div>
            </div>`;
    });
    lucide.createIcons();
}
</script>
</body>
</html>
