<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --primary: #8bc34a; --text: #ffffff; --muted: #aaaaaa; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { color: var(--primary); font-weight: bold; font-size: 1.5rem; text-transform: uppercase; }
        .settings-btn { background: #222; border: none; color: var(--muted); padding: 8px 12px; border-radius: 5px; cursor: pointer; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; background: #222; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; }
        #scanBtn { width: 100%; background: var(--primary); border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1rem; color: #000; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #scanBtn:disabled { opacity: 0.5; }
        .card { background: var(--card); border-radius: 12px; margin-top: 15px; overflow: hidden; border: 1px solid #333; }
        .card-body { padding: 15px; }
        .price-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .p-buy { text-decoration: line-through; color: #ff5252; font-weight: bold; }
        .p-sell { color: #8bc34a; font-weight: bold; font-size: 1.2rem; }
        .m-pill { background: rgba(139, 195, 74, 0.1); color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
        .btn-vinted { display: block; text-align: center; background: #007782; color: white; text-decoration: none; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.9rem; }
        #loader { display: none; text-align: center; margin: 20px 0; }
        #settingsPanel { display: none; background: #222; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <div class="logo">FLIPFINDER</div>
    <button class="settings-btn" onclick="toggleSettings()">⚙️ GOOGLE KEY</button>
</header>

<div id="settingsPanel">
    <p style="font-size: 0.8rem; color: var(--muted); margin-top: 0;">Colle ta clé API Gemini ci-dessous :</p>
    <input type="password" id="apiKeyInput" placeholder="AIzaSy...">
    <button onclick="saveKey()" style="margin-top:10px; background:var(--primary); border:none; padding:8px; width:100%; border-radius:5px; font-weight:bold;">Enregistrer</button>
</div>

<div class="input-group">
    <input type="text" id="brands" placeholder="Nike / Adidas">
    <input type="text" id="budget" placeholder="25€ max">
</div>

<button id="scanBtn" onclick="scan()">🔍 SCANNER GRATUITEMENT</button>

<div id="loader">
    <p>🤖 L'IA analyse Vinted...</p>
</div>

<div id="resultsContainer"></div>

<script>
    window.onload = () => {
        const savedKey = localStorage.getItem('flip_gemini_key');
        if (savedKey) document.getElementById('apiKeyInput').value = savedKey;
    };

    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveKey() {
        const key = document.getElementById('apiKeyInput').value.trim();
        localStorage.setItem('flip_gemini_key', key);
        alert("✅ Clé enregistrée !");
        toggleSettings();
    }

    async function scan() {
        const key = localStorage.getItem('flip_gemini_key');
        if (!key) { alert("❌ Ajoute ta clé (⚙️)"); toggleSettings(); return; }

        const btn = document.getElementById('scanBtn');
        const loader = document.getElementById('loader');
        const container = document.getElementById('resultsContainer');

        btn.disabled = true; 
        container.innerHTML = ''; 
        loader.style.display = 'block';

        const prompt = `Agis en expert Vinted. Donne 4 opportunités d'achat-revente : Nike, Adidas, Ralph Lauren. Réponds UNIQUEMENT avec ce JSON : {"items":[{"title":"Nom","brand":"Marque","size":"Taille","buyPrice":10,"sellPrice":30,"tip":"Conseil"}]}`;

        try {
            // Changement pour le modèle PRO qui est plus stable sur les anciennes versions
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            const text = data.candidates[0].content.parts[0].text;
            const jsonMatch = text.match(/\{[\s\S]*\}/);
            const results = JSON.parse(jsonMatch[0]).items;
            
            results.forEach(item => {
                const profit = item.sellPrice - item.buyPrice;
                container.innerHTML += `
                    <div class="card">
                        <div class="card-body">
                            <h3>${item.title}</h3>
                            <p style="font-size:0.8rem; color:var(--muted)">${item.brand} • ${item.size}</p>
                            <div class="price-row">
                                <span class="p-buy">${item.buyPrice}€</span>
                                <span class="p-sell">${item.sellPrice}€</span>
                                <span class="m-pill">+${profit}€ de profit</span>
                            </div>
                            <p style="font-size:0.75rem; color:#aaa">💡 ${item.tip}</p>
                            <a href="https://www.vinted.fr/catalog?search_text=${encodeURIComponent(item.brand + ' ' + item.title)}&price_to=${item.buyPrice}" target="_blank" class="btn-vinted">Trouver sur Vinted</a>
                        </div>
                    </div>`;
            });

        } catch (err) {
            alert("⚠️ " + err.message);
        } finally {
            loader.style.display = 'none'; 
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
