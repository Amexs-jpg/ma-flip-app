<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro - Resale Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505; --surface: #111; --card: #181818; --border: #282828;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #888; --good: #4caf50; --warn: #f1a435;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 24px 20px 80px; max-width: 600px; margin: auto;
        }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 2px; color: var(--accent); }
        .logo span { color: var(--text); }
        .badge { 
            background: rgba(212, 255, 63, 0.1); color: var(--accent); 
            font-size: 10px; font-weight: 800; padding: 6px 12px; 
            border-radius: 20px; border: 1px solid var(--accent);
        }
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        input {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 14px; border-radius: 12px; font-size: 14px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); background: #1c1c1c; }
        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 18px;
            border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: transform 0.1s;
        }
        .btn-scan:active { transform: scale(0.98); }
        .btn-scan:disabled { opacity: 0.3; cursor: not-allowed; }
        .stats-bar {
            display: none; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; margin: 24px 0; overflow: hidden;
        }
        .stat { flex: 1; padding: 16px; border-right: 1px solid var(--border); text-align: center; }
        .stat:last-child { border-right: none; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); }
        .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 18px;
            margin-bottom: 16px; overflow: hidden; animation: slideUp 0.4s ease both;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .card-top { display: flex; padding: 12px; gap: 14px; }
        .card-photo { width: 110px; height: 140px; background: #111; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        .card-photo img.loaded { opacity: 1; }
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-brand { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .card-title { font-size: 14px; font-weight: 500; color: #eee; margin: 4px 0; }
        .price-container { display: flex; align-items: baseline; gap: 8px; margin-top: 4px; }
        .price-buy { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: #666; text-decoration: line-through; }
        .price-sell { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--text); }
        .profit-tag { 
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(76, 175, 80, 0.1); color: #4caf50; 
            padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-top: 8px;
        }
        .card-footer { padding: 12px; background: rgba(255,255,255,0.02); display: flex; gap: 10px; }
        .btn-action { 
            flex: 1; padding: 12px; border-radius: 10px; font-size: 12px; font-weight: 700; 
            text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-vinted { background: var(--vinted); color: white; }
        .btn-lbc { border: 1px solid var(--border); color: var(--muted); }
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner {
            width: 30px; height: 30px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge">V2.1 PRO</div>
</div>

<div class="filters">
    <div class="filter-group">
        <label><i data-lucide="tag" size="12"></i> Marque</label>
        <input type="text" id="marque" value="Nike">
    </div>
    <div class="filter-group">
        <label><i data-lucide="wallet" size="12"></i> Budget Max</label>
        <input type="text" id="budget" value="40€">
    </div>
    <div class="filter-group">
        <label><i data-lucide="shirt" size="12"></i> Type</label>
        <input type="text" id="type" value="Veste">
    </div>
    <div class="filter-group">
        <label><i data-lucide="maximize" size="12"></i> Taille</label>
        <input type="text" id="taille" value="M">
    </div>
</div>

<button class="btn-scan" id="scanBtn" onclick="lancerScan()">
    <i data-lucide="zap" size="18"></i> ANALYSER LE MARCHÉ
</button>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color: var(--muted); font-size: 12px;">Filtrage des annonces par budget...</p>
</div>

<div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Pépites</div></div>
    <div class="stat"><div class="stat-val" id="statMargin">0%</div><div class="stat-label">ROI Max</div></div>
    <div class="stat"><div class="stat-val" id="statProfit">0€</div><div class="stat-label">Profit Moyen</div></div>
</div>

<div id="results"></div>

<script>
lucide.createIcons();

function lancerScan() {
    const marque = document.getElementById('marque').value;
    const type = document.getElementById('type').value;
    const taille = document.getElementById('taille').value;
    const budgetRaw = document.getElementById('budget').value;
    
    // NETTOYAGE DU BUDGET
    const budgetNum = parseInt(budgetRaw.replace(/[^0-9]/g, '')) || 30;

    document.getElementById('results').innerHTML = '';
    document.getElementById('statsBar').style.display = 'none';
    document.getElementById('loading').classList.add('active');
    document.getElementById('scanBtn').disabled = true;

    setTimeout(() => {
        const items = [];
        for(let i=0; i<5; i++) {
            // RESPECT DU BUDGET : Le prix d'achat est forcément inférieur au budget saisi
            // On génère un prix entre 50% et 95% du budget max
            const buy = Math.floor(budgetNum * (0.5 + Math.random() * 0.45));
            const sell = Math.floor(buy * (1.8 + Math.random() * 0.6));
            
            const frais = 0.70 + (buy * 0.05);
            const profit = Math.round(sell - buy - frais);
            const roi = Math.round((profit / buy) * 100);

            items.push({
                title: `${marque} ${type} Style`,
                brand: marque,
                buy: buy,
                sell: sell,
                profit: profit,
                roi: roi,
                photo: `https://picsum.photos/seed/${marque}${i}${Date.now()}/220/280`
            });
        }

        render(items, type, taille, budgetNum);
        document.getElementById('loading').classList.remove('active');
        document.getElementById('scanBtn').disabled = false;
    }, 1200);
}

function render(items, type, taille, budgetNum) {
    const container = document.getElementById('results');
    document.getElementById('statsBar').style.display = 'flex';
    
    const maxRoi = Math.max(...items.map(i => i.roi));
    const avgProfit = Math.round(items.reduce((acc, i) => acc + i.profit, 0) / items.length);

    document.getElementById('statCount').textContent = items.length;
    document.getElementById('statMargin').textContent = maxRoi + '%';
    document.getElementById('statProfit').textContent = avgProfit + '€';

    items.forEach((item, i) => {
        // CONSTRUCTION DE L'URL AVEC FILTRE DE PRIX RÉEL
        // On ajoute &price_to=${budgetNum} pour filtrer sur Vinted
        const searchQuery = encodeURIComponent(`${item.brand} ${type} ${taille}`);
        const vintedUrl = `https://www.vinted.fr/catalog?search_text=${searchQuery}&price_to=${budgetNum}&order=newest_first`;

        container.innerHTML += `
            <div class="card" style="animation-delay: ${i * 0.1}s">
                <div class="card-top">
                    <div class="card-photo">
                        <img src="${item.photo}" onload="this.classList.add('loaded')">
                    </div>
                    <div class="card-info">
                        <div class="card-brand">${item.brand}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="price-container">
                            <span class="price-buy">${item.buy}€</span>
                            <span class="price-sell">${item.sell}€</span>
                        </div>
                        <div>
                            <span class="profit-tag">
                                <i data-lucide="trending-up" size="12"></i>
                                +${item.profit}€ net (ROI ${item.roi}%)
                            </span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="${vintedUrl}" target="_blank" class="btn-action btn-vinted">
                        <i data-lucide="shopping-bag" size="14"></i> VOIR SUR VINTED
                    </a>
                    <a href="#" class="btn-action btn-lbc">
                        <i data-lucide="bar-chart-2" size="14"></i> ANALYSER
                    </a>
                </div>
            </div>`;
    });
    lucide.createIcons();
}
</script>
</body>
</html>
