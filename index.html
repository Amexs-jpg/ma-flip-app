<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder - Resale</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; }
        .logo { color: #d4ff3f; font-size: 24px; font-weight: bold; letter-spacing: -1px; }
        .logo span { color: white; }
        .badge { background: #d4ff3f; color: black; padding: 5px 12px; border-radius: 20px; float: right; font-size: 10px; font-weight: 900; text-align: center; line-height: 1.1; }
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        label { display: block; font-size: 10px; color: #777; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; }
        .input-box { background: #151515; border: 1px solid #252525; padding: 12px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 14px; outline: none; }
        .input-box:focus { border-color: #d4ff3f; }
        .api-field { border: 1px solid #d4ff3f44; color: #d4ff3f; font-family: 'Courier New', Courier, monospace; }
        .btn-scanner { background: #d4ff3f; color: black; width: 100%; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; transition: transform 0.1s; }
        .btn-scanner:active { transform: scale(0.98); }
        #results { margin-top: 30px; text-align: center; }
        .error-box { background: #111; border-radius: 12px; padding: 20px; margin-top: 20px; border: 1px solid #222; }
        .error-msg { color: #ff5f5f; font-family: monospace; font-size: 12px; text-align: left; margin-top: 10px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="badge">IA<br>POWERED</div>
    <div class="logo">Flip<span>Finder</span></div>
    <p style="font-size: 12px; color: #555; margin-top: 4px;">Détecteur d'opportunités · Liens directs Vinted</p>

    <div class="filters">
        <div><label>Marque</label><input type="text" class="input-box" id="marque" value="Nike"></div>
        <div><label>Budget Max</label><input type="text" class="input-box" id="budget" value="50€"></div>
        <div><label>Type</label><input type="text" class="input-box" id="type" value="T-shirts"></div>
        <div><label>Taille</label><input type="text" class="input-box" id="taille" value="S"></div>
    </div>

    <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">

    <label>Ta Clé API (Key)</label>
    <input type="password" id="api_key" class="input-box api-field" placeholder="Colle ta clé AIzaSy... ici" value="">

    <button class="btn-scanner" onclick="lancerScan()">🔍 SCANNER</button>

    <div id="results"></div>

    <script>
        // CONFIGURATION : Remplace l'URL ci-dessous par l'adresse de ton service de recherche
        const BASE_ENDPOINT = "https://ton-serveur-ou-api.com/search"; 

        async function lancerScan() {
            const resultsDiv = document.getElementById('results');
            const key = document.getElementById('api_key').value.trim();
            
            // Récupération des filtres pour la recherche
            const marque = document.getElementById('marque').value;
            const budget = document.getElementById('budget').value;

            if (!key) {
                afficherErreur("Clé API manquante. Veuillez coller votre clé pour continuer.");
                return;
            }

            resultsDiv.innerHTML = "<p style='color:#d4ff3f'>Analyse des opportunités en cours...</p>";

            try {
                // Construction de l'URL avec la clé et les paramètres
                // Exemple : https://api.com/search?key=AIza...&q=Nike+50€
                const urlComplete = `${BASE_ENDPOINT}?key=${key}&q=${encodeURIComponent(marque + " " + budget)}`;

                const response = await fetch(urlComplete);
                
                if (!response.ok) {
                    throw new Error(`Réponse Serveur : ${response.status}. Vérifie si ta clé est valide pour cet endpoint.`);
                }
                
                const data = await response.json();
                
                // On essaie de trouver les résultats dans le JSON reçu
                const produits = Array.isArray(data) ? data : (data.items || data.results || []);

                if (produits.length === 0) {
                    resultsDiv.innerHTML = "<p>Aucune pépite trouvée pour le moment.</p>";
                } else {
                    resultsDiv.innerHTML = produits.map(p => `
                        <div style="background:#151515; padding:15px; margin-bottom:12px; border-radius:12px; text-align:left; border-left: 4px solid #d4ff3f;">
                            <div style="font-size:14px; font-weight:bold;">${p.title || p.nom || 'Article trouvé'}</div>
                            <div style="color:#d4ff3f; font-size:13px; margin-top:4px;">${p.price || p.prix || 'Prix inconnu'}</div>
                        </div>
                    `).join('');
                }

            } catch (error) {
                afficherErreur(error.message);
            }
        }

        function afficherErreur(msg) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div style="margin-top: 20px;">
                    <img src="https://cdn-icons-png.flaticon.com/512/564/564619.png" width="60" style="filter: invert(1); opacity: 0.8;">
                    <h2 style="margin:10px 0; font-size: 18px;">Erreur de Connexion</h2>
                    <div class="error-box">
                        <p style="color:#555; font-size:10px; text-align:left; margin:0; text-transform:uppercase;">Détails Techniques</p>
                        <p class="error-msg">${msg}</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
