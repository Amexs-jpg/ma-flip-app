<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505; --card: #121212; --accent: #d4ff3f; --vinted: #09b1ba;
            --text: #ffffff; --muted: #888; --border: #222; --inventory: #a855f7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 1px; }
        .logo span { color: var(--accent); }

        /* Filtres */
        .filter-box { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        select, input { width: 100%; background: #1a1a1a; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; margin-top: 8px; margin-bottom: 15px; }
        
        .btn-scan { background: var(--accent); color: black; width: 100%; border: none; padding: 15px; border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .btn-scan:active { transform: scale(0.98); }

        /* Cards */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 15px; overflow: hidden; animation: fadeIn 0.5s ease forwards; }
        .card-content { display: flex; padding: 15px; gap: 15px; }
        .img-placeholder { width: 90px; height: 110px; background: #1a1a1a; border-radius: 12px; object-fit: cover; }
        
        .info h3 { font-size: 1rem; margin-bottom: 5px; }
        .prices { display: flex; align-items: baseline; gap: 10px; margin-bottom: 5px; }
        .price-buy { color: var(--muted); text-decoration: line-through; font-size: 0.9rem; }
        .price-sell { color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; }
        
        .profit-badge { background: rgba(212, 255, 63, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; display: inline-block; }
        
        /* Point 2 : Liquidité */
        .liquidity { font-size: 0.7rem; color: #f1a435; display: flex; align-items: center; gap: 4px; margin-top: 5px; text-transform: uppercase; font-weight: bold; }

        .actions { display: flex; padding: 10px 15px; gap: 10px; border-top: 1px solid var(--border); background: rgba(255,255,255,0.02); }
        .btn-vinted { flex: 2; background: var(--vinted); color: white; text-decoration: none; text-align: center; padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; }
        
        /* Point 5 : Bouton Acquisition */
        .btn-add { flex: 1; background: transparent; border: 1px solid var(--inventory); color: var(--inventory); padding: 10px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; cursor: pointer; }
        .btn-add:active { background: var(--inventory); color: white; }

        /* Section Inventaire */
        .inventory-container { margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border); }
        .inv-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; margin-bottom: 15px; color: var(--inventory); display: flex; justify-content: space-between; }
        .inv-item { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--inventory); }
        .inv-total { background: var(--inventory); color: white; padding: 15px; border-radius: 12px; margin-top: 10px; text-align: center; font-weight: bold; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">FLIP<span>FINDER</span></div>
        <i data-lucide="menu"></i>
    </div>

    <div class="filter-box">
        <label style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Marque Ciblée</label>
        <select id="brand">
            <option value="Carhartt">Carhartt WIP</option>
            <option value="Nike">Nike Sportswear</option>
            <option value="Stussy">Stüssy</option>
            <option value="Ralph Lauren">Ralph Lauren</option>
        </select>
        
        <label style="font-size: 0.7rem; color: var(--muted); text-transform: uppercase;">Budget d'achat max</label>
        <input type="number" id="budget" value="50">
        
        <button class="btn-scan" onclick="simulateScan()">ANALYSER LE MARCHÉ</button>
    </div>

    <div id="results"></div>

    <div class="inventory-container" id="inventorySection" style="display: none;">
        <div class="inv-title">MON INVENTAIRE <span id="invCount" style="font-size: 0.9rem; opacity: 0.7;">0 articles</span></div>
        <div id="inventoryItems"></div>
        <div class="inv-total">PROFIT TOTAL ESTIMÉ : <span id="totalProfit">0</span> €</div>
    </div>

    <script>
        lucide.createIcons();
        let myInventory = [];

        function simulateScan() {
            const brand = document.getElementById('brand').value;
            const budget = document.getElementById('budget').value;
            const results = document.getElementById('results');
            
            results.innerHTML = '<p style="text-align:center; color:var(--muted);">Recherche de pépites...</p>';

            setTimeout(() => {
                results.innerHTML = '';
                // Simulation de 2 articles
                createCard(brand + " Detroit Jacket", budget, Math.floor(budget * 2.2), 95);
                createCard(brand + " Vintage Hoodie", Math.floor(budget/2), Math.floor(budget * 1.5), 70);
            }, 800);
        }

        function createCard(name, buy, sell, liqScore) {
            const results = document.getElementById('results');
            const profit = sell - buy;
            const liqText = liqScore > 80 ? "🔥 TRÈS FORTE DEMANDE" : "⚡ DEMANDE MOYENNE";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-content">
                    <img src="https://loremflickr.com/200/250/clothes?lock=${Math.random()}" class="img-placeholder">
                    <div class="info">
                        <h3>${name}</h3>
                        <div class="prices">
                            <span class="price-buy">${buy}€</span>
                            <span class="price-sell">${sell}€</span>
                        </div>
                        <div class="profit-badge">+${profit}€ PROFIT</div>
                        <div class="liquidity"><i data-lucide="trending-up" size="12"></i> ${liqText}</div>
                    </div>
                </div>
                <div class="actions">
                    <a href="#" class="btn-vinted">VOIR SUR VINTED</a>
                    <button class="btn-add" onclick="addToInventory('${name}', ${profit})">ACQUISITION</button>
                </div>
            `;
            results.appendChild(card);
            lucide.createIcons();
        }

        function addToInventory(name, profit) {
            myInventory.push({ name, profit });
            document.getElementById('inventorySection').style.display = 'block';
            updateInventoryUI();
        }

        function updateInventoryUI() {
            const list = document.getElementById('inventoryItems');
            const totalDisplay = document.getElementById('totalProfit');
            const countDisplay = document.getElementById('invCount');
            
            list.innerHTML = '';
            let total = 0;

            myInventory.forEach(item => {
                total += item.profit;
                list.innerHTML += `
                    <div class="inv-item">
                        <span>${item.name}</span>
                        <span style="color:var(--accent); font-weight:bold;">+${item.profit}€</span>
                    </div>
                `;
            });

            totalDisplay.innerText = total;
            countDisplay.innerText = `${myInventory.length} articles`;
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
