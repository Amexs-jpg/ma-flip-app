<script>
window.addEventListener('load', function () {

    if (typeof lucide !== 'undefined') lucide.createIcons();

    var MSGS = [
        "Synchronisation des bases de données...",
        "Analyse des prix de revente...",
        "Calcul des marges nettes...",
        "Identification des meilleures pépites...",
        "Génération des conseils de revente..."
    ];

    var msgInterval = null;
    window.lancerScan = lancerScan;
    window.openCompare = openCompare;

    function startLoading() {
        document.getElementById('results').innerHTML = '';
        document.getElementById('statsBar').style.display = 'none';
        document.getElementById('loading').classList.add('active');
        document.getElementById('scanBtn').disabled = true;
        var i = 0;
        clearInterval(msgInterval);
        msgInterval = setInterval(function () {
            i = (i + 1) % MSGS.length;
            document.getElementById('loadingText').textContent = MSGS[i];
        }, 1200);
    }

    function stopLoading() {
        clearInterval(msgInterval);
        document.getElementById('loading').classList.remove('active');
        document.getElementById('scanBtn').disabled = false;
    }

    function showToast(msg) {
        var el = document.getElementById('toast');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(function () { el.style.display = 'none'; }, 4000);
    }

    function openCompare(platform, query) {
        if (!platform) return;
        var q = encodeURIComponent(query);
        var urls = {
            lbc: 'https://www.leboncoin.fr/recherche?text=' + q,
            ebay: 'https://www.ebay.fr/sch/i.html?_nkw=' + q,
            stockx: 'https://stockx.com/fr-fr/search?s=' + q
        };
        if (urls[platform]) window.open(urls[platform], '_blank');
    }

    // Simulation de données car l'appel API direct est impossible en Front-end pur
    function simulerIA(marque, budget, categorie, taille) {
        return new Promise(resolve => {
            setTimeout(() => {
                const budgetNum = parseInt(budget);
                resolve([
                    {
                        title: marque + " " + categorie + " Vintage",
                        brand: marque,
                        categorie: categorie,
                        size: taille,
                        buyPrice: Math.floor(budgetNum * 0.7),
                        sellPrice: Math.floor(budgetNum * 1.4),
                        condition: "Très bon état",
                        conditionEmoji: "🟢",
                        grade: "A",
                        location: "Paris, France",
                        sellerRating: 5,
                        views: 124,
                        vintedSearch: marque.toLowerCase() + " " + taille.toLowerCase(),
                        photoQuery: "clothing",
                        tip: "Modèle très recherché. Prends des photos à la lumière du jour pour une vente en moins de 24h."
                    },
                    {
                        title: marque + " Edition Spéciale",
                        brand: marque,
                        categorie: categorie,
                        size: taille,
                        buyPrice: Math.floor(budgetNum * 0.9),
                        sellPrice: Math.floor(budgetNum * 1.2),
                        condition: "Bon état",
                        conditionEmoji: "🟡",
                        grade: "B",
                        location: "Lyon, France",
                        sellerRating: 4.5,
                        views: 45,
                        vintedSearch: marque.toLowerCase(),
                        photoQuery: "fashion",
                        tip: "Poste l'annonce le dimanche soir vers 19h pour maximiser la visibilité."
                    }
                ]);
            }, 3000);
        });
    }

    async function lancerScan() {
        var marque = document.getElementById('marque').value.trim();
        var budget = document.getElementById('budget').value.trim();
        var catKey = document.getElementById('typeSelect').value;
        var taille = document.getElementById('taille').value.trim();
        
        startLoading();

        try {
            // NOTE : L'appel direct à Anthropic ici échouera à cause du CORS.
            // Pour un vrai projet, utilisez un serveur Node.js/Python intermédiaire.
            // On utilise la simulation pour la démo visuelle :
            const items = await simulerIA(marque, budget, catKey, taille);

            stopLoading();
            render(items, budget);
            updateStats(items);
            showToast("Analyse terminée : " + items.length + " pépites trouvées !");

        } catch (err) {
            stopLoading();
            document.getElementById('results').innerHTML = '<div class="error-box">Erreur: Appel API impossible en local.</div>';
        }
    }

    function render(items, budget) {
        var container = document.getElementById('results');
        container.innerHTML = '';
        var budgetNum = parseInt(budget) || 100;

        items.forEach(function (item, i) {
            var margin = Math.round(((item.sellPrice - item.buyPrice) / item.buyPrice) * 100);
            var profit = item.sellPrice - item.buyPrice;
            var gradeClass = 'grade-' + (item.grade || 'c').toLowerCase();
            
            // Correction de l'URL photo (Picsum fonctionne mieux comme ça)
            var photo = 'https://picsum.photos/seed/' + i + '/220/280';
            
            container.innerHTML += `
                <div class="card" style="animation-delay:${i * 0.1}s">
                    <div class="grade-badge ${gradeClass}">${item.grade}</div>
                    <div class="card-top">
                        <div class="card-photo">
                            <img src="${photo}" class="loaded" alt="item">
                            <div class="live-dot"><div class="dot-pulse"></div>Vinted</div>
                        </div>
                        <div class="card-info">
                            <div class="card-tag">${item.categorie}</div>
                            <div class="card-title">${item.title}</div>
                            <div class="card-meta">${item.conditionEmoji} ${item.condition} · 📏 ${item.size}</div>
                            <div class="card-meta">📍 ${item.location} · 👁 ${item.views}</div>
                            <div class="price-box">
                                <span class="buy-price">${item.buyPrice}€</span>
                                <span class="price-arrow">→</span>
                                <span class="sell-price">${item.sellPrice}€</span>
                            </div>
                            <div class="profit-tag">📈 +${profit}€ NET · ${margin}% marge</div>
                        </div>
                    </div>
                    <div class="card-tip">💡 ${item.tip}</div>
                    <div class="card-footer">
                        <a href="#" class="btn-action btn-vinted">🛍 VOIR SUR VINTED</a>
                        <div class="compare-dropdown">
                            <select class="select-compare" onchange="window.openCompare(this.value, '${item.title}')">
                                <option value="" disabled selected>COMPARER</option>
                                <option value="lbc">LEBONCOIN</option>
                                <option value="ebay">EBAY</option>
                            </select>
                        </div>
                    </div>
                </div>`;
        });
    }

    function updateStats(items) {
        var profits = items.map(i => i.sellPrice - i.buyPrice);
        var avg = Math.round(profits.reduce((a, b) => a + b, 0) / profits.length);
        document.getElementById('statCount').textContent = items.length;
        document.getElementById('statHot').textContent = items.filter(i => i.grade === 'A').length;
        document.getElementById('statProfit').textContent = avg + '€';
        document.getElementById('statsBar').style.display = 'block';
    }
});
</script>
