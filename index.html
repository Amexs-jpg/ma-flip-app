<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --primary: #8bc34a; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .logo { color: var(--primary); font-weight: bold; font-size: 1.5rem; margin-bottom: 20px; }
        input { width: 100%; background: #222; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        #scanBtn { width: 100%; background: var(--primary); border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: var(--card); border-radius: 12px; margin-top: 15px; padding: 15px; border: 1px solid #333; }
        #loader { display: none; text-align: center; margin: 20px 0; color: var(--primary); }
    </style>
</head>
<body>

<div style="display:flex; justify-content:space-between; align-items:center;">
    <div class="logo">FLIPFINDER</div>
    <button onclick="toggleSettings()" style="background:none; border:none; color:#aaa;">⚙️ CLÉ</button>
</div>

<div id="settingsPanel" style="display:none; margin-bottom:20px;">
    <input type="password" id="apiKeyInput" placeholder="Nouvelle clé AIza...">
    <button onclick="saveKey()" style="width:100%; padding:8px; background:white; border:none; border-radius:5px;">SAUVEGARDER</button>
</div>

<div style="display:flex; gap:10px;">
    <input type="text" id="brands" placeholder="Nike, Adidas...">
    <input type="text" id="budget" placeholder="Budget Max €">
</div>

<button id="scanBtn" onclick="scan()">🔍 SCANNER LES PÉPITES</button>
<div id="loader">🤖 Analyse IA...</div>
<div id="resultsContainer"></div>

<script>
    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveKey() {
        localStorage.setItem('flip_gemini_key', document.getElementById('apiKeyInput').value.trim());
        alert("Clé enregistrée !");
        toggleSettings();
    }

    async function scan() {
        const key = localStorage.getItem('flip_gemini_key');
        if (!key) { alert("Mets la nouvelle clé !"); toggleSettings(); return; }

        document.getElementById('loader').style.display = 'block';
        const brands = document.getElementById('brands').value || "Nike";
        const budget = document.getElementById('budget').value || "30";

        try {
            // Utilisation du modèle flash-latest qui est le plus robuste
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Donne 3 idées flip Vinted pour ${brands} budget ${budget}€. Réponds uniquement en JSON: {"items":[{"title":"Objet","buy":10,"sell":30}]}` }] }] })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const text = data.candidates[0].content.parts[0].text;
            const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
            
            document.getElementById('resultsContainer').innerHTML = '';
            json.items.forEach(item => {
                document.getElementById('resultsContainer').innerHTML += `
                    <div class="card">
                        <h3>${item.title}</h3>
                        <p>Achat: ${item.buy}€ | Revente: ${item.sell}€</p>
                    </div>`;
            });
        } catch (err) {
            alert("Erreur : " + err.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
