<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlipFinder Pro - Visual Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    <script>
        function initLucide() {
            if (typeof lucide !== 'undefined') { lucide.createIcons(); }
            else { setTimeout(initLucide, 80); }
        }
        document.addEventListener('DOMContentLoaded', initLucide);
    </script>
    <style>
        :root {
            --bg: #050505; --surface: #111; --card: #181818; --border: #282828;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #888; --score-a: #d4ff3f; --score-b: #f1a435; --score-c: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 20px 15px 80px; 
            max-width: 100%; /* S'ajuste à l'écran */
            margin: auto;
            overflow-x: hidden; /* Évite le scroll horizontal */
        }

        /* Conteneur pour limiter la largeur sur PC tout en restant full width sur mobile */
        @media (min-width: 600px) {
            body { max-width: 500px; }
        }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 2px; color: var(--accent); }
        .logo span { color: var(--text); }
        .badge { background: rgba(212, 255, 63, 0.1); color: var(--accent); font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--accent); }

        .inventory-panel {
            background: var(--surface); border: 1px solid var(--accent); border-radius: 16px;
            padding: 15px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;
        }
        .inv-info { display: flex; flex-direction: column; }
        .inv-label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
        .inv-amount { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--accent); }
        .btn-reset-inv { background: transparent; border: 1px solid #333; color: #555; padding: 4px 8px; border-radius: 6px; font-size: 9px; cursor: pointer; }

        /* AJOUT : Style pour le switch Micro-Entrepreneur */
        .tax-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); background-color: #000; }

        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        input, select {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 14px; border-radius: 12px; font-size: 13px; outline: none; transition: 0.2s;
            appearance: none; width: 100%;
        }
        input:focus, select:focus { border-color: var(--accent); background: #1c1c1c; }

        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 18px;
            border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .stats-bar { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin: 24px 0; overflow: hidden; }
        .stat { flex: 1; padding: 16px; border-right: 1px solid var(--border); text-align: center; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); }
        .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; margin-bottom: 16px; overflow: hidden; position: relative; animation: slideUp 0.4s ease both; }
        .grade-badge { position: absolute; top: 12px; right: 12px; width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; z-index: 10; font-weight: bold; }
        .grade-a { background: var(--score-a); color: #000; box-shadow: 0 0 20px rgba(212,255,63,0.2); }
        .grade-b { background: var(--score-b); color: #000; }
        .grade-c { background: var(--score-c); color: #fff; }

        .card-top { display: flex; padding: 15px; gap: 16px; }
        .card-photo { width: 95px; height: 125px; background: #111; border-radius: 14px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        .card-photo img.loaded { opacity: 1; }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .card-tag { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .card-title { font-size: 14px; font-weight: 600; color: #eee; margin-bottom: 6px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .price-box { display: flex; align-items: baseline; gap: 8px; }
        .buy-price { font-family: 'Bebas Neue', sans-serif; color: #666; text-decoration: line-through; font-size: 1.1rem; }
        .sell-price { font-family: 'Bebas Neue', sans-serif; color: #fff; font-size: 1.8rem; }

        /* AJOUT : Style pour le détail des taxes/frais */
        .tax-detail { font-size: 9px; color: #555; margin-top: 4px; line-height: 1.2; }

        .profit-tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(212, 255, 63, 0.08); color: var(--accent); padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-top: 8px; border: 1px solid rgba(212, 255, 63, 0.2); width: fit-content; }

        .card-footer { padding: 10px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); display: flex; gap: 6px; }
        .btn-action { flex: 1; padding: 12px 6px; border-radius: 10px; font-size: 10px; font-weight: 800; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; }
        .btn-vinted { background: var(--vinted); color: white; }
        .btn-acquire { background: var(--accent); color: #000; }

        .compare-dropdown { width: 80px; position: relative; }
        .select-compare {
            width: 100%; height: 100%; padding: 0 5px; border-radius: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ccc;
            font-size: 9px; font-weight: 700; cursor: pointer; appearance: none;
            text-align: center; outline: none;
        }

        .loading { display: none; text-align: center; padding: 40px; color: var(--muted); font-size: 12px; }
        .loading.active { display: block; }

        .size-tabs { display: flex; gap: 6px; margin-bottom: 6px; }
        .size-tab {
            flex: 1; padding: 8px 4px; border-radius: 8px; font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: 1px solid var(--border);
            background: var(--card); color: var(--muted); text-align: center; transition: 0.15s;
        }
        .size-tab.active { background: rgba(212,255,63,0.1); border-color: var(--accent); color: var(--accent); }

        /* Optimisation pour les très petits écrans */
        @media (max-width: 370px) {
            .logo { font-size: 1.8rem; }
            .inv-amount { font-size: 1.4rem; }
            .card-photo { width: 80px; height: 110px; }
            .btn-action { font-size: 9px; padding: 10px 4px; }
            .compare-dropdown { width: 60px; }
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge">V4.0 HD-VISUAL SCAN</div>
</div>

<div class="inventory-panel">
    <div class="inv-info">
        <span class="inv-label">Profit Cumulé</span>
        <span class="inv-amount" id="totalProfit">0€</span>
    </div>

<div class="tax-panel">

                <option value="Timberland">Timberland</option>
                <option value="Dr. Martens">Dr. Martens</option>

    </div>
    <div class="filter-group">
        <label><i data-lucide="wallet" size="12"></i> Budget Max</label>
        <input type="text" id="budget" value="65€">

    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="layers" size="12"></i> Catégorie Ciblée</label>
        <select id="typeSelect">
            <option value="outerwear">Vestes & Blousons</option>

            <option value="sneakers">Sneakers</option>

    <div class="filter-group" style="grid-column: span 2;">

</div>

<button class="btn-scan" id="scanBtn" onclick="lancerScan()">
    <i data-lucide="zap" size="18"></i> ANALYSER LE FLUX VISUEL
</button>

<div class="loading" id="loading">Récupération des visuels produits et calcul des marges nettes...</div>

<div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Opportunités</div></div>
    <div class="stat"><div class="stat-val" id="statProfit">0€</div><div class="stat-label">Gain Moyen</div></div>
</div>

<div id="results"></div>

<script>
let inventory = JSON.parse(localStorage.getItem('ff_inventory')) || { profit: 0, count: 0 };

function updateInvUI() {
    document.getElementById('totalProfit').textContent = inventory.profit.toFixed(2) + '€';
    document.getElementById('itemsCount').textContent = inventory.count + ' Items acquis';
    localStorage.setItem('ff_inventory', JSON.stringify(inventory));
}

function addToInventory(profit, btn) {
    inventory.profit += profit;
    inventory.count += 1;
    updateInvUI();
    btn.innerHTML = '<i data-lucide="check" size="14"></i> ACQUIS';
    btn.style.opacity = "0.5";
    btn.style.pointerEvents = "none";
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function resetInventory() {
    if(confirm("Réinitialiser l'inventaire ?")) {
        inventory = { profit: 0, count: 0 };
        updateInvUI();
    }
}

// EXTENSION DE LA BASE DE DONNÉES (MARKET MATRIX)
const marketMatrix = {
    "Carhartt": {
        "outerwear": [
            { n:"Detroit Jacket", img:"carhartt+detroit", vinted:[35,55], sell:[85,120] },
            { n:"Santa Fe Jacket", img:"carhartt+santa+fe", vinted:[30,45], sell:[65,90] },
            { n:"Active Jacket Hooded", img:"carhartt+active", vinted:[25,40], sell:[55,75] }
        ],
        "tops": [
            { n:"Hoodie Chase Logo", img:"carhartt+hoodie", vinted:[12,20], sell:[35,48] },
            { n:"Sweat American Script", img:"carhartt+sweat", vinted:[15,25], sell:[40,55] }
        ],
        "bottoms": [
            { n:"Double Knee Pant", img:"carhartt+double+knee", vinted:[35,50], sell:[75,110] },
            { n:"Single Knee Pant", img:"carhartt+single+knee", vinted:[22,35], sell:[48,65] }
        ]
    },
    "Nike": {
        "outerwear": [
            { n:"Veste Nocta Tech", img:"nike+nocta", vinted:[60,90], sell:[130,170] },
            { n:"Bomber Vintage 90s", img:"nike+bomber", vinted:[18,30], sell:[45,70] }
        ],
        "tops": [
            { n:"Hoodie Swoosh Vintage", img:"nike+hoodie", vinted:[12,22], sell:[38,55] },
            { n:"Sweat Vintage Brodé", img:"nike+sweat", vinted:[10,18], sell:[28,42] }
        ],
        "sneakers": [
            { n:"Air Force 1 White", img:"nike+af1", vinted:[25,45], sell:[60,85] },
            { n:"Dunk Low Retro", img:"nike+dunk", vinted:[40,65], sell:[85,115] }
        ]
    },
    "Ralph Lauren": {
        "outerwear": [
            { n:"Doudoune Sans Manches", img:"ralph+lauren+vest", vinted:[20,35], sell:[50,75] },
            { n:"Veste Harrington", img:"ralph+lauren+jacket", vinted:[25,45], sell:[60,95] }
        ],
        "tops": [
            { n:"Pull Torsadé Laine", img:"ralph+lauren+knit", vinted:[15,28], sell:[45,65] },
            { n:"Chemise Oxford", img:"ralph+lauren+shirt", vinted:[8,15], sell:[25,40] }
        ]
    },
    "Stussy": {
        "tops": [
            { n:"8 Ball Hoodie", img:"stussy+8ball", vinted:[40,60], sell:[95,130] },
            { n:"Basic Stussy Sweat", img:"stussy+basic", vinted:[25,45], sell:[65,85] }
        ]
    },
    "Stone Island": {
        "tops": [
            { n:"Sweat Crewneck Ghost", img:"stone+island+sweat", vinted:[80,120], sell:[180,240] }
        ],
        "outerwear": [
            { n:"Soft Shell Jacket", img:"stone+island+jacket", vinted:[140,200], sell:[280,380] }
        ]
    }
};

function switchSizeTab(type) {
    document.getElementById('tab-vetement').classList.toggle('active', type === 'vetement');
    document.getElementById('tab-chaussure').classList.toggle('active', type === 'chaussure');
    document.getElementById('taille-vetement').style.display = type === 'vetement' ? 'block' : 'none';
    document.getElementById('taille-chaussure').style.display = type === 'chaussure' ? 'block' : 'none';
}

function lancerScan() {
    const results = document.getElementById('results');
    const loading = document.getElementById('loading');
    const statsBar = document.getElementById('statsBar');
    const isTaxed = document.getElementById('taxSwitch').checked;
    
    results.innerHTML = '';
    loading.classList.add('active');
    statsBar.style.display = 'none';

    setTimeout(() => {
        loading.classList.remove('active');
        statsBar.style.display = 'flex';
        
        const marque = document.getElementById('marque-vetement').value;
        const type = document.getElementById('typeSelect').value;
        
        let foundItems = [];
        if(marque === "ALL") {
            Object.keys(marketMatrix).forEach(brand => {
                if(marketMatrix[brand][type]) {
                    marketMatrix[brand][type].forEach(item => { item.brand = brand; foundItems.push(item); });
                }
            });
        } else if(marketMatrix[marque] && marketMatrix[marque][type]) {
            marketMatrix[marque][type].forEach(item => { item.brand = marque; foundItems.push(item); });
        }

        document.getElementById('statCount').textContent = foundItems.length;
        let totalProfitSim = 0;

        foundItems.forEach(item => {
            const priceVinted = item.vinted[0];
            const priceSell = item.sell[0];
            
            // CALCUL DES FRAIS VINTED (0.70€ + 5%)
            const vintedFees = 0.70 + (priceVinted * 0.05);
            const shipping = 3.50; // Estimation port
            const totalBuyCost = priceVinted + vintedFees + shipping;
            
            // CALCUL PROFIT NET
            let netProfit = priceSell - totalBuyCost;
            let taxValue = 0;
            
            if(isTaxed) {
                taxValue = priceSell * 0.123;
                netProfit -= taxValue;
            }

            totalProfitSim += netProfit;
            const grade = netProfit > 30 ? 'a' : (netProfit > 15 ? 'b' : 'c');

            results.innerHTML += `
                <div class="card">
                    <div class="grade-badge grade-${grade}">${grade.toUpperCase()}</div>
                    <div class="card-top">
                        <div class="card-photo">
                            <img src="https://loremflickr.com/200/300/fashion,${item.brand}" onload="this.classList.add('loaded')">
                        </div>
                        <div class="card-info">
                            <span class="card-tag">${item.brand}</span>
                            <div class="card-title">${item.n}</div>
                            <div class="price-box">
                                <span class="buy-price">${priceVinted}€</span>
                                <span class="sell-price">${priceSell}€</span>
                            </div>
                            <div class="tax-detail">
                                Coût réel (Frais+Port): ${totalBuyCost.toFixed(2)}€<br>
                                ${isTaxed ? `Cotisation URSSAF (-12.3%): -${taxValue.toFixed(2)}€` : 'Régime Particulier (Sans Taxes)'}
                            </div>
                            <div class="profit-tag">
                                <i data-lucide="trending-up" size="12"></i> PROFIT NET: ${netProfit.toFixed(2)}€
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <button class="btn-action btn-vinted"><i data-lucide="external-link" size="14"></i> VINTED</button>
                        <button class="btn-action btn-acquire" onclick="addToInventory(${netProfit}, this)">
                            <i data-lucide="plus-circle" size="14"></i> ACQUÉRIR
                        </button>
                    </div>
                </div>
            `;
        });
        document.getElementById('statProfit').textContent = (totalProfitSim / (foundItems.length || 1)).toFixed(2) + '€';
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }, 1200);
}

document.addEventListener('DOMContentLoaded', updateInvUI);
</script>

</body>
</html>
