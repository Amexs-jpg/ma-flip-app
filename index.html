<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro - Visual Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    <style>
        :root {
            --bg: #050505; --surface: #111; --card: #181818; --border: #282828;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #888; --score-a: #d4ff3f; --score-b: #f1a435; --score-c: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 24px 20px 80px; max-width: 600px; margin: auto;
        }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 2px; color: var(--accent); }
        .logo span { color: var(--text); }
        .badge { background: rgba(212, 255, 63, 0.1); color: var(--accent); font-size: 10px; font-weight: 800; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--accent); }

        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        input, select {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 14px; border-radius: 12px; font-size: 13px; outline: none; transition: 0.2s;
            appearance: none; width: 100%;
        }
        input:focus, select:focus { border-color: var(--accent); background: #1c1c1c; }

        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 18px;
            border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: transform 0.1s;
        }
        .btn-scan:active { transform: scale(0.98); }
        .btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }

        .stats-bar { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin: 24px 0; overflow: hidden; }
        .stat { flex: 1; padding: 16px; border-right: 1px solid var(--border); text-align: center; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); }
        .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; margin-bottom: 16px; overflow: hidden; position: relative; animation: slideUp 0.4s ease both; }
        .grade-badge { position: absolute; top: 12px; right: 12px; width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; z-index: 10; font-weight: bold; }
        .grade-a { background: var(--score-a); color: #000; box-shadow: 0 0 20px rgba(212,255,63,0.2); }
        .grade-b { background: var(--score-b); color: #000; }
        .grade-c { background: var(--score-c); color: #fff; }

        .card-top { display: flex; padding: 15px; gap: 16px; }
        .card-photo { width: 105px; height: 135px; background: #111; border-radius: 14px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        .card-photo img.loaded { opacity: 1; }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-tag { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .card-title { font-size: 14px; font-weight: 600; color: #eee; margin-bottom: 6px; line-height: 1.2; }
        
        .price-box { display: flex; align-items: baseline; gap: 8px; }
        .buy-price { font-family: 'Bebas Neue', sans-serif; color: #666; text-decoration: line-through; font-size: 1.1rem; }
        .sell-price { font-family: 'Bebas Neue', sans-serif; color: #fff; font-size: 1.8rem; }

        .profit-tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(212, 255, 63, 0.08); color: var(--accent); padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-top: 8px; border: 1px solid rgba(212, 255, 63, 0.2); }

        .card-footer { padding: 12px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .btn-action { flex: 1.2; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 800; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-vinted { background: var(--vinted); color: white; }

        .compare-dropdown { flex: 1; position: relative; }
        .select-compare {
            width: 100%; height: 100%; padding: 12px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ccc;
            font-size: 10px; font-weight: 700; cursor: pointer; appearance: none;
            text-align: center; outline: none;
        }

        .loading { display: none; text-align: center; padding: 40px; color: var(--muted); font-size: 12px; }
        .loading.active { display: block; }

        .size-tabs { display: flex; gap: 6px; margin-bottom: 6px; }
        .size-tab {
            flex: 1; padding: 6px; border-radius: 8px; font-size: 9px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: 1px solid var(--border);
            background: var(--card); color: var(--muted); text-align: center; transition: 0.15s;
        }
        .size-tab.active { background: rgba(212,255,63,0.1); border-color: var(--accent); color: var(--accent); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge">V4.0 HD-VISUAL SCAN</div>
</div>

<div class="filters">
    <div class="filter-group">
        <label><i data-lucide="tag" size="12"></i> Marque</label>
        <select id="marque-vetement">
            <optgroup label="── Streetwear ──">
                <option value="Carhartt">Carhartt WIP</option>
                <option value="Stussy">Stüssy</option>
                <option value="Palace">Palace</option>
                <option value="Supreme">Supreme</option>
                <option value="Bape">Bape</option>
                <option value="Kith">Kith</option>
                <option value="Aimé Leon Dore">Aimé Leon Dore</option>
                <option value="Noah">Noah</option>
            </optgroup>
            <optgroup label="── Sportswear ──">
                <option value="Nike">Nike</option>
                <option value="Adidas">Adidas</option>
                <option value="Jordan">Jordan</option>
                <option value="New Balance">New Balance</option>
                <option value="Puma">Puma</option>
                <option value="Asics">Asics</option>
                <option value="Reebok">Reebok</option>
                <option value="Under Armour">Under Armour</option>
            </optgroup>
            <optgroup label="── Luxury / Preppy ──">
                <option value="Ralph Lauren">Ralph Lauren</option>
                <option value="Tommy Hilfiger">Tommy Hilfiger</option>
                <option value="Lacoste">Lacoste</option>
                <option value="Fred Perry">Fred Perry</option>
                <option value="Burberry">Burberry</option>
                <option value="Stone Island">Stone Island</option>
                <option value="CP Company">CP Company</option>
            </optgroup>
            <optgroup label="── Vintage / Workwear ──">
                <option value="Levi's">Levi's</option>
                <option value="Wrangler">Wrangler</option>
                <option value="Lee">Lee</option>
                <option value="Dickies">Dickies</option>
                <option value="Timberland">Timberland</option>
                <option value="Patagonia">Patagonia</option>
                <option value="Arc'teryx">Arc'teryx</option>
                <option value="The North Face">The North Face</option>
            </optgroup>
        </select>
        <select id="marque-chaussure" style="display:none;">
            <optgroup label="── Sneakers Hype ──">
                <option value="Nike">Nike</option>
                <option value="Jordan">Jordan</option>
                <option value="Adidas">Adidas</option>
                <option value="New Balance">New Balance</option>
                <option value="Asics">Asics</option>
                <option value="Reebok">Reebok</option>
                <option value="Puma">Puma</option>
                <option value="Vans">Vans</option>
                <option value="Converse">Converse</option>
            </optgroup>
            <optgroup label="── Running / Trail ──">
                <option value="Salomon">Salomon</option>
                <option value="On Running">On Running</option>
                <option value="Hoka">Hoka</option>
                <option value="Saucony">Saucony</option>
                <option value="Brooks">Brooks</option>
                <option value="Mizuno">Mizuno</option>
            </optgroup>
            <optgroup label="── Boots / Casual ──">
                <option value="Timberland">Timberland</option>
                <option value="Dr. Martens">Dr. Martens</option>
                <option value="Birkenstock">Birkenstock</option>
                <option value="UGG">UGG</option>
                <option value="Clarks">Clarks</option>
                <option value="Crocs">Crocs</option>
            </optgroup>
        </select>
    </div>
    <div class="filter-group">
        <label><i data-lucide="wallet" size="12"></i> Budget Max</label>
        <input type="text" id="budget" value="65€">
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="layers" size="12"></i> Catégorie Ciblée</label>
        <select id="typeSelect">
            <option value="outerwear">Vestes & Blousons</option>
            <option value="tops">Hauts (Hoodies, Sweats...)</option>
            <option value="bottoms">Pantalons (Double Knee...)</option>
            <option value="sneakers">Sneakers</option>
        </select>
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="maximize" size="12"></i> Taille</label>
        <div class="size-tabs">
            <div class="size-tab active" id="tab-vetement" onclick="switchSizeTab('vetement')">👕 Vêtement</div>
            <div class="size-tab" id="tab-chaussure" onclick="switchSizeTab('chaussure')">👟 Chaussure</div>
        </div>
        <select id="taille-vetement">
            <option value="XXS">XXS</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L" selected>L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
            <option value="3XL">3XL</option>
            <option value="4XL">4XL</option>
            <option value="W28">W28 / Jeans</option>
            <option value="W30">W30 / Jeans</option>
            <option value="W32">W32 / Jeans</option>
            <option value="W34">W34 / Jeans</option>
        </select>
        <select id="taille-chaussure" style="display:none;">
            <option value="38">38</option>
            <option value="39">39</option>
            <option value="40">40</option>
            <option value="41">41</option>
            <option value="42">42</option>
            <option value="43" selected>43</option>
            <option value="44">44</option>
            <option value="45">45</option>
        </select>
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="sparkles" size="12"></i> État</label>
        <select id="condition">
            <option value="very_good">Très bon état</option>
            <option value="new">Neuf avec étiquette</option>
        </select>
    </div>
</div>

<button class="btn-scan" id="scanBtn" onclick="lancerScan()">
    <i data-lucide="zap" size="18"></i> ANALYSER LE FLUX VISUEL
</button>

<div class="loading" id="loading">Récupération des visuels produits et calcul des marges...</div>

<div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Opportunités</div></div>
    <div class="stat"><div class="stat-val" id="statProfit">0€</div><div class="stat-label">Gain Moyen</div></div>
</div>

<div id="results"></div>

<script>
// Initialisation sécurisée de Lucide
document.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();
    }
});

const marketMatrix = {
    "CARHARTT": {
        "outerwear": [
            { n:"Detroit Jacket", img:"carhartt+work+jacket", vinted:[30,50], sell:[75,95] },
            { n:"Santa Fe Jacket", img:"carhartt+canvas+jacket", vinted:[25,40], sell:[60,80] },
            { n:"Active Jacket Hooded", img:"carhartt+hooded+jacket", vinted:[18,32], sell:[45,62] }
        ],
        "tops": [
            { n:"Hoodie Chase Logo", img:"carhartt+hoodie+logo", vinted:[10,18], sell:[28,38] },
            { n:"Sweat American Script", img:"carhartt+sweatshirt", vinted:[12,22], sell:[32,44] }
        ],
        "bottoms": [
            { n:"Double Knee Pant", img:"carhartt+double+knee+pants", vinted:[28,45], sell:[60,80] }
        ]
    },
    "NIKE": {
        "sneakers": [
            { n:"Air Force 1 White", img:"nike+air+force+1+white", vinted:[25,40], sell:[52,68] },
            { n:"Dunk Low Retro", img:"nike+dunk+low+sneakers", vinted:[38,58], sell:[72,95] },
            { n:"Air Max 90", img:"nike+air+max+90+retro", vinted:[25,42], sell:[52,72] }
        ],
        "outerwear": [
            { n:"Veste Nocta Tech", img:"nike+nocta+jacket", vinted:[50,75], sell:[105,135] }
        ],
        "tops": [
            { n:"Hoodie Swoosh Vintage", img:"nike+hoodie+swoosh", vinted:[10,18], sell:[28,40] }
        ]
    },
    "STUSSY": {
        "outerwear": [
            { n:"8 Ball Fleece Jacket", img:"stussy+fleece+jacket", vinted:[60,90], sell:[130,165] }
        ],
        "tops": [
            { n:"T-Shirt World Tour", img:"stussy+graphic+tshirt", vinted:[12,22], sell:[35,50] },
            { n:"Hoodie Dice Logo", img:"stussy+hoodie", vinted:[22,38], sell:[55,75] }
        ],
        "bottoms": [
            { n:"Big Ol Jeans", img:"stussy+wide+jeans", vinted:[35,55], sell:[75,100] }
        ]
    },
    "DEFAULT": {
        "outerwear": [{ n:"Veste Vintage", img:"vintage+jacket+thrift", vinted:[8,18], sell:[28,42] }],
        "tops": [{ n:"Hoodie Graphic", img:"graphic+hoodie+streetwear", vinted:[5,12], sell:[18,28] }],
        "bottoms": [{ n:"Baggy Jeans", img:"baggy+jeans+vintage", vinted:[6,14], sell:[22,35] }],
        "sneakers": [{ n:"Sneakers Retro", img:"retro+sneakers+vintage", vinted:[12,25], sell:[35,52] }]
    }
};

function getImg(keywords, seed) {
    const kw = keywords.replace(/\+/g, ',');
    return `https://loremflickr.com/220/280/${kw}?lock=${seed}`;
}

function pick(range) {
    return Math.floor(range[0] + Math.random() * (range[1] - range[0]));
}

function switchSizeTab(tab) {
    const isVêtement = (tab === 'vetement');
    document.getElementById('tab-vetement').classList.toggle('active', isVêtement);
    document.getElementById('tab-chaussure').classList.toggle('active', !isVêtement);
    
    document.getElementById('taille-vetement').style.display = isVêtement ? '' : 'none';
    document.getElementById('taille-chaussure').style.display = !isVêtement ? '' : 'none';
    
    document.getElementById('marque-vetement').style.display = isVêtement ? '' : 'none';
    document.getElementById('marque-chaussure').style.display = !isVêtement ? '' : 'none';
    
    if (!isVêtement) document.getElementById('typeSelect').value = 'sneakers';
}

function getMarque() {
    const isChaussureTab = document.getElementById('tab-chaussure').classList.contains('active');
    return isChaussureTab
        ? document.getElementById('marque-chaussure').value.toUpperCase()
        : document.getElementById('marque-vetement').value.toUpperCase();
}

function lancerScan() {
    const marqueInput = getMarque();
    const catKey = document.getElementById('typeSelect').value;
    const budgetRaw = document.getElementById('budget').value;
    const budget = parseInt(budgetRaw.replace(/[^\d]/g, '')) || 65;
    const taille = document.getElementById('tab-chaussure').classList.contains('active') 
        ? document.getElementById('taille-chaussure').value 
        : document.getElementById('taille-vetement').value;

    document.getElementById('results').innerHTML = '';
    document.getElementById('loading').classList.add('active');
    document.getElementById('scanBtn').disabled = true;

    const brandSource = marketMatrix[marqueInput] || marketMatrix["DEFAULT"];
    const models = brandSource[catKey] || marketMatrix["DEFAULT"][catKey];

    setTimeout(() => {
        const items = models.map((model, i) => {
            const buy = Math.min(pick(model.vinted), budget);
            const sell = pick(model.sell);
            const profit = Math.round(sell - buy - (0.7 + buy * 0.05));
            const ratio = sell / buy;

            return {
                title: `${marqueInput.charAt(0) + marqueInput.slice(1).toLowerCase()} ${model.n}`,
                tag: catKey.toUpperCase(),
                buy, sell, profit,
                grade: ratio > 2.2 ? 'A' : (ratio > 1.7 ? 'B' : 'C'),
                photo: getImg(model.img, i + marqueInput.length)
            };
        });

        render(items, taille, budget);
        document.getElementById('loading').classList.remove('active');
        document.getElementById('scanBtn').disabled = false;
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('statCount').textContent = items.length;
        document.getElementById('statProfit').textContent = Math.round(items.reduce((acc, it) => acc + it.profit, 0) / items.length) + "€";
    }, 1200);
}

function render(items, taille, budget) {
    const container = document.getElementById('results');
    let html = '';
    items.forEach((item, i) => {
        const exactSearch = `${item.title} ${taille}`;
        const searchUrl = `https://www.vinted.fr/catalog?search_text=${encodeURIComponent(exactSearch)}&price_to=${budget}&order=newest_first`;

        html += `
            <div class="card" style="animation-delay: ${i * 0.1}s">
                <div class="grade-badge grade-${item.grade.toLowerCase()}">${item.grade}</div>
                <div class="card-top">
                    <div class="card-photo">
                        <img src="${item.photo}" onload="this.classList.add('loaded')">
                    </div>
                    <div class="card-info">
                        <div class="card-tag">${item.tag}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="price-box">
                            <span class="buy-price">${item.buy}€</span>
                            <i data-lucide="arrow-right" size="14" style="color:#444"></i>
                            <span class="sell-price">${item.sell}€</span>
                        </div>
                        <div class="profit-tag">
                            <i data-lucide="zap" size="12"></i> FAST PROFIT : +${item.profit}€
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="${searchUrl}" target="_blank" class="btn-action btn-vinted">
                        <i data-lucide="shopping-bag" size="14"></i> SNIPER SUR VINTED
                    </a>
                </div>
            </div>`;
    });
    container.innerHTML = html;
    if (typeof lucide !== 'undefined') lucide.createIcons();
}
</script>
</body>
</html>
