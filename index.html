<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlipFinder - Resale</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --surface: #111;
    --card: #151515;
    --border: #222;
    --accent: #d4ff3f;
    --vinted: #09b1ba;
    --text: #fff;
    --muted: #555;
    --good: #4caf50;
    --warn: #f1a435;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 24px 20px 80px;
    max-width: 700px;
    margin: auto;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    color: var(--accent);
    line-height: 1;
  }
  .logo span { color: var(--text); }
  .badge {
    background: var(--accent);
    color: #000;
    font-size: 9px;
    font-weight: 900;
    padding: 5px 11px;
    border-radius: 20px;
    letter-spacing: 1px;
    text-align: center;
    line-height: 1.5;
  }
  .subtitle { font-size: 12px; color: var(--muted); margin-bottom: 28px; }

  /* ── FILTERS ── */
  .filters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }
  .filter-group { display: flex; flex-direction: column; gap: 6px; }
  label {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    font-weight: 700;
    letter-spacing: 1px;
  }
  input[type="text"] {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
    width: 100%;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  hr { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }

  /* ── SCAN BUTTON ── */
  .btn-scan {
    background: var(--accent);
    color: #000;
    width: 100%;
    border: none;
    padding: 17px;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.25rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .btn-scan:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-scan:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* ── LOADING ── */
  .loading { display: none; text-align: center; padding: 50px 20px; }
  .loading.active { display: block; }
  .spinner {
    width: 38px; height: 38px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 13px; }

  /* ── STATS BAR ── */
  .stats-bar {
    display: none;
    flex-wrap: wrap;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin: 20px 0 4px;
    overflow: hidden;
  }
  .stat {
    flex: 1;
    min-width: 80px;
    padding: 12px 16px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat:last-child { border-right: none; }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 10px;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 700;
    margin: 16px 0 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: #2e2e2e;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── CARD TOP: photo + info ── */
  .card-top { display: flex; }

  .card-photo {
    width: 130px;
    min-width: 130px;
    height: 155px;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.45s ease, opacity 0.4s;
    opacity: 0;
  }
  .card-photo img.loaded { opacity: 1; }
  .card:hover .card-photo img { transform: scale(1.07); }

  /* Skeleton shimmer while image loads */
  .photo-skeleton {
    position: absolute;
    inset: 0;
    background: linear-gradient(110deg, #111 30%, #1c1c1c 50%, #111 70%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    color: #222;
    transition: opacity 0.3s;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* Score badge overlay on photo */
  .score-overlay {
    position: absolute;
    bottom: 8px;
    left: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.82rem;
    padding: 3px 8px;
    border-radius: 6px;
    letter-spacing: 1px;
    z-index: 2;
  }
  .score-hot { background: rgba(212,255,63,0.92); color: #000; }
  .score-ok  { background: rgba(241,164,53,0.92);  color: #000; }
  .score-meh { background: rgba(20,20,20,0.88);    color: #888; border: 1px solid #333; }

  /* Vinted "live" dot */
  .vinted-dot-wrap {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(9,177,186,0.85);
    border-radius: 20px;
    padding: 2px 7px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    z-index: 2;
  }
  .vinted-pulse {
    width: 5px; height: 5px;
    background: #fff;
    border-radius: 50%;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Card info section */
  .card-info {
    flex: 1;
    padding: 13px 14px 11px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }
  .card-brand {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--warn);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
  }
  .card-meta {
    font-size: 11px;
    color: #666;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card-meta span {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    padding: 1px 7px;
    border-radius: 20px;
  }

  .price-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .price-buy  { font-family: 'Bebas Neue', sans-serif; font-size: 1.45rem; color: var(--text); line-height: 1; }
  .price-arrow { color: #444; font-size: 12px; }
  .price-sell { font-family: 'Bebas Neue', sans-serif; font-size: 1.45rem; color: var(--accent); line-height: 1; }
  .margin-pill {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(76,175,80,0.15);
    color: var(--good);
    margin-left: auto;
  }

  .tip {
    font-size: 11px;
    color: #888;
    line-height: 1.55;
    padding: 8px 10px;
    background: #0e0e0e;
    border-radius: 8px;
    border-left: 3px solid var(--accent);
    margin-top: 2px;
  }

  /* ── CARD FOOTER ── */
  .card-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .btn-vinted {
    flex: 2;
    text-align: center;
    padding: 10px 12px;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 700;
    border: none;
    background: var(--vinted);
    color: #fff;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn-vinted:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-lbc {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: transparent;
    color: #aaa;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-lbc:hover { background: var(--border); color: var(--text); }

  /* ── ERROR ── */
  .error-box {
    background: #120000;
    border: 1px solid #3a0000;
    border-radius: 12px;
    padding: 24px;
    text-align: center;
    margin-top: 20px;
  }
  .error-msg {
    color: #ff6b6b;
    font-size: 12px;
    font-family: monospace;
    margin-top: 10px;
    text-align: left;
    line-height: 1.7;
  }

  /* ── NOTIF TOAST ── */
  .notif {
    display: none;
    position: fixed;
    bottom: 22px;
    right: 22px;
    background: var(--accent);
    color: #000;
    padding: 13px 18px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 13px;
    box-shadow: 0 6px 28px rgba(212,255,63,0.35);
    z-index: 999;
    max-width: 280px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">Flip<span>Finder</span></div>
    <div class="subtitle">Simulateur d'annonces · Opportunités achat-revente</div>
  </div>
  <div class="badge">IA<br>POWERED</div>
</div>

<!-- FILTERS -->
<div class="filters">
  <div class="filter-group">
    <label>Marque</label>
    <input type="text" id="marque" value="Nike" placeholder="Ex: Nike, Lacoste...">
  </div>
  <div class="filter-group">
    <label>Budget Max</label>
    <input type="text" id="budget" value="30€" placeholder="Ex: 30€">
  </div>
  <div class="filter-group">
    <label>Type</label>
    <input type="text" id="type" value="T-shirt" placeholder="Ex: T-shirt, Veste...">
  </div>
  <div class="filter-group">
    <label>Taille</label>
    <input type="text" id="taille" value="M" placeholder="Ex: M, L, XL...">
  </div>
</div>

<hr>

<!-- SCAN BUTTON -->
<button class="btn-scan" id="scanBtn" onclick="lancerScan()">
  🔍 SCANNER LES OPPORTUNITÉS
</button>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Analyse en cours...</div>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Annonces</div></div>
  <div class="stat"><div class="stat-val" id="statHot">0</div><div class="stat-label">Top affaires 🔥</div></div>
  <div class="stat"><div class="stat-val" id="statMargin">0%</div><div class="stat-label">Marge max</div></div>
  <div class="stat"><div class="stat-val" id="statProfit">0€</div><div class="stat-label">Profit moyen</div></div>
</div>

<!-- RESULTS -->
<div id="results"></div>

<!-- TOAST -->
<div class="notif" id="notif"></div>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════ */
// Unsplash Access Key (gratuite sur unsplash.com/developers)
// Remplace par ta propre clé pour plus de requêtes
const UNSPLASH_KEY = "sD9A2kJ7pNqXvL5mRtYeWcBhFuGiOjE3"; // clé demo, à remplacer

const LOADING_MSGS = [
  "Scan des annonces Vinted en cours...",
  "Estimation des prix de revente...",
  "Calcul des marges bénéficiaires...",
  "Recherche des meilleures photos...",
  "Finalisation des opportunités..."
];

/* ═══════════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════════ */
function showNotif(msg, duration = 4500) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, duration);
}

let msgInterval;
function startLoading() {
  document.getElementById('results').innerHTML = '';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('loading').classList.add('active');
  document.getElementById('scanBtn').disabled = true;
  let i = 0;
  msgInterval = setInterval(() => {
    i = (i + 1) % LOADING_MSGS.length;
    document.getElementById('loadingText').textContent = LOADING_MSGS[i];
  }, 1800);
}
function stopLoading() {
  clearInterval(msgInterval);
  document.getElementById('loading').classList.remove('active');
  document.getElementById('scanBtn').disabled = false;
}

function buildVintedUrl(search, priceMax) {
  const p = new URLSearchParams();
  p.set('search_text', search);
  if (priceMax) p.set('price_to', String(priceMax));
  return `https://www.vinted.fr/catalog?${p.toString()}`;
}

function buildLbcUrl(brand, type) {
  return `https://www.leboncoin.fr/recherche?text=${encodeURIComponent(brand + ' ' + type)}&category=64`;
}

/* ═══════════════════════════════════════════════════
   PHOTO — Picsum pour placeholder fiable,
   + tentative Unsplash si clé valide
═══════════════════════════════════════════════════ */
// IDs Picsum curated pour vêtements (toujours disponibles)
const PHOTO_SEEDS = [
  'fashion','clothes','streetwear','tshirt','jacket','hoodie',
  'sneakers','polo','denim','vintage','sport','menswear'
];

function getPicsumUrl(query, index) {
  // Picsum avec seed basé sur la query = image cohérente et toujours disponible
  const seed = encodeURIComponent((query || 'fashion') + index);
  return `https://picsum.photos/seed/${seed}/260/310`;
}

/* ═══════════════════════════════════════════════════
   MAIN SCAN
═══════════════════════════════════════════════════ */
async function lancerScan() {
  const marque = document.getElementById('marque').value.trim() || 'Nike';
  const budget = document.getElementById('budget').value.trim() || '30€';
  const type   = document.getElementById('type').value.trim()   || 'T-shirt';
  const taille = document.getElementById('taille').value.trim() || 'M';

  startLoading();

  const prompt = `Tu es un expert en achat-revente de vêtements de seconde main sur Vinted en France.

Simule exactement 6 annonces Vinted ultra-réalistes à acheter et revendre, avec ces critères :
- Marque : ${marque}
- Budget max d'achat : ${budget}
- Type de vêtement : ${type}
- Taille : ${taille}

Ces annonces doivent ressembler à de vraies annonces Vinted : titre réaliste, état usé ou très bon, prix cohérents avec le marché français.

Réponds UNIQUEMENT en JSON valide sans markdown ni backticks :
{
  "items": [
    {
      "title": "Titre de l'annonce style Vinted (ex: Nike Air T-Shirt Blanc Taille M - Très bon état)",
      "brand": "Marque",
      "type": "Type de vêtement",
      "size": "Taille",
      "buyPrice": 12,
      "sellPrice": 38,
      "priceMax": 15,
      "condition": "Très bon état",
      "conditionEmoji": "🟢",
      "score": "hot",
      "location": "Paris, Île-de-France",
      "sellerRating": 4.8,
      "views": 47,
      "vintedSearch": "nike tshirt blanc m",
      "photoQuery": "nike white tshirt",
      "tip": "Conseil de revente précis en 1-2 phrases.",
      "tags": ["populaire", "facile à revendre"]
    }
  ]
}

Règles :
- buyPrice doit être <= budget indiqué (retire le symbole €)
- priceMax = budget max recommandé à payer (légèrement sous buyPrice)
- vintedSearch = requête Vinted courte, en minuscules, sans accents
- photoQuery = 2-3 mots anglais décrivant le vêtement pour trouver une belle photo
- conditionEmoji : 🟢 Très bon état, 🟡 Bon état, 🔴 Correct
- location = ville française réaliste
- sellerRating entre 4.0 et 5.0
- views = nombre de vues réaliste (entre 10 et 200)
- score : hot si marge > 100%, ok si 50-100%, meh si < 50%
Retourne SEULEMENT le JSON.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2500,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    let raw = data.content.map(b => b.text || "").join("").trim().replace(/```json|```/g, "").trim();

    // ── Parsing robuste : répare le JSON si tronqué ──
    let items;
    try {
      items = JSON.parse(raw).items;
    } catch (parseErr) {
      // Récupération : extraire les objets complets depuis le tableau items
      const arrMatch = raw.match(/"items"\s*:\s*\[([\s\S]*)/);
      if (arrMatch) {
        let arrStr = arrMatch[1];
        let depth = 0, lastClose = -1;
        for (let ci = 0; ci < arrStr.length; ci++) {
          if (arrStr[ci] === '{') depth++;
          if (arrStr[ci] === '}') { depth--; if (depth === 0) lastClose = ci; }
        }
        if (lastClose > -1) {
          try { items = JSON.parse('[' + arrStr.slice(0, lastClose + 1) + ']'); } catch(e2) { items = null; }
        }
      }
      if (!items || items.length === 0) throw new Error("Réponse IA invalide ou trop longue. Réessaie !");
    }

    stopLoading();
    renderCards(items);
    updateStats(items);

    const hot = items.filter(i => i.score === 'hot').length;
    setTimeout(() => showNotif(
      hot > 0
        ? `🔥 ${hot} top affaire${hot > 1 ? 's' : ''} trouvée${hot > 1 ? 's' : ''} ! Clique "Voir sur Vinted".`
        : `✅ ${items.length} opportunités trouvées !`
    ), 600);

  } catch (err) {
    stopLoading();
    afficherErreur(err.message);
  }
}

/* ═══════════════════════════════════════════════════
   RENDER CARDS
═══════════════════════════════════════════════════ */
function renderCards(items) {
  const div = document.getElementById('results');
  div.innerHTML = `<div class="section-label">Annonces simulées — style Vinted</div>`;

  items.forEach((item, i) => {
    const margin  = Math.round(((item.sellPrice - item.buyPrice) / item.buyPrice) * 100);
    const profit  = item.sellPrice - item.buyPrice;
    const scoreLbl = item.score === 'hot' ? '🔥 TOP'  : item.score === 'ok' ? '✅ BON' : '💤 OK';
    const scoreCls = 'score-' + (item.score || 'meh');

    const vUrl  = buildVintedUrl(item.vintedSearch || `${item.brand} ${item.type}`, item.priceMax);
    const lUrl  = buildLbcUrl(item.brand, item.type);
    const photo = getPicsumUrl(item.photoQuery || `${item.brand} ${item.type}`, i);

    const stars = '★'.repeat(Math.round(item.sellerRating || 4)) + '☆'.repeat(5 - Math.round(item.sellerRating || 4));
    const tags  = (item.tags || []).map(t => `<span class="card-meta"><span>${t}</span></span>`).join('');

    div.innerHTML += `
      <div class="card" style="animation-delay:${i * 0.08}s">

        <div class="card-top">
          <!-- PHOTO -->
          <div class="card-p
