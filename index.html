<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro - Sniper Elite V3.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505; --surface: #0f0f0f; --card: #161616; --border: #222;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #666; --score-a: #d4ff3f; --score-b: #f1a435; --score-c: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 24px 20px 80px; max-width: 500px; margin: auto;
        }

        /* Animations */
        @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 1px; color: var(--accent); }
        .logo span { color: var(--text); }
        .badge { background: #1a1a1a; color: var(--accent); font-size: 9px; font-weight: 800; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--accent); }

        /* Formulaire Style */
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        
        input, select {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 12px; border-radius: 10px; font-size: 13px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }

        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 16px;
            border-radius: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: transform 0.1s active;
        }
        .btn-scan:active { transform: scale(0.98); }

        /* Status & Stats */
        .loading-zone { display: none; margin: 20px 0; text-align: center; }
        .loading-zone.active { display: block; }
        .skeleton-card { height: 120px; background: var(--card); border-radius: 15px; margin-bottom: 10px; animation: pulse 1.5s infinite; }

        .stats-bar { 
            display: none; background: var(--surface); border: 1px solid var(--border); 
            border-radius: 14px; margin: 20px 0; overflow: hidden; 
        }
        .stat { flex: 1; padding: 12px; text-align: center; border-right: 1px solid var(--border); }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--accent); }
        .stat-label { font-size: 8px; color: var(--muted); text-transform: uppercase; }

        /* Cards Elite */
        .card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 20px; 
            margin-bottom: 14px; overflow: hidden; position: relative;
            animation: slideIn 0.4s ease forwards;
        }
        
        .grade-tag {
            position: absolute; top: 12px; right: 12px; padding: 4px 8px; border-radius: 6px;
            font-family: 'Bebas Neue', sans-serif; font-size: 1rem; z-index: 5;
        }

        .card-body { display: flex; padding: 12px; gap: 12px; }
        .img-container { 
            width: 90px; height: 110px; background: #000; border-radius: 12px; 
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        .img-container img.loaded { opacity: 0.7; }
        
        /* Effet de scan sur l'image */
        .img-container::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: var(--accent); box-shadow: 0 0 10px var(--accent);
            animation: scanline 2s linear infinite;
        }

        .info { flex: 1; }
        .item-brand { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .item-name { font-size: 14px; font-weight: 600; margin: 2px 0 8px; color: #fff; }
        
        .price-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .price-buy { font-size: 12px; color: #777; text-decoration: line-through; }
        .price-sell { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: #fff; }

        .roi-badge {
            display: inline-flex; align-items: center; gap: 4px; 
            background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px;
            font-size: 10px; font-weight: 700; color: #ddd;
        }

        .card-actions { 
            display: flex; padding: 10px; background: rgba(0,0,0,0.2); 
            border-top: 1px solid var(--border); gap: 8px;
        }
        .btn-main { 
            flex: 2; background: var(--vinted); color: #fff; text-decoration: none;
            text-align: center; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: 800;
        }
        .btn-sec {
            flex: 1; background: var(--surface); border: 1px solid var(--border);
            color: #ccc; font-size: 10px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge">V3.5 SNIPER-ELITE</div>
</div>

<div class="filters">
    <div class="filter-group" style="grid-column: span 2;">
        <label>Cible Marque</label>
        <input type="text" id="brand" value="Carhartt">
    </div>
    <div class="filter-group">
        <label>Budget</label>
        <input type="number" id="budget" value="60">
    </div>
    <div class="filter-group">
        <label>Taille</label>
        <input type="text" id="size" value="L">
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label>Catégorie</label>
        <select id="category">
            <option value="outerwear">Vestes & Workwear</option>
            <option value="tops">Sweats & Knitwear</option>
            <option value="sneakers">Sneakers & Hype</option>
        </select>
    </div>
</div>

<button class="btn-scan" onclick="startScan()">
    <i data-lucide="crosshair" size="20"></i> ANALYSER LE MARCHÉ
</button>

<div class="loading-zone" id="loading">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <p style="font-size: 10px; color: var(--muted)">RECHERCHE DE SOUS-ÉVALUATIONS EN COURS...</p>
</div>

<div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Opportunités</div></div>
    <div class="stat"><div class="stat-val" id="statAvgProfit">0€</div><div class="stat-label">Profit Net Moyen</div></div>
</div>

<div id="results"></div>

<script>
lucide.createIcons();

const DB = {
    "outerwear": [
        { n: "Detroit Jacket", m: 2.5, t: "WORKWEAR" },
        { n: "Santa Fe Jacket", m: 2.2, t: "VINTAGE" },
        { n: "Active Canvas", m: 1.8, t: "ESSENTIAL" }
    ],
    "tops": [
        { n: "Hoodie Vintage 90s", m: 2.1, t: "RETRO" },
        { n: "Zip-up Heavyweight", m: 1.9, t: "STREET" },
        { n: "Pull en Laine", m: 2.4, t: "PREMIUM" }
    ],
    "sneakers": [
        { n: "Jordan 4 Retro", m: 1.6, t: "HYPE" },
        { n: "New Balance 990", m: 1.9, t: "TREND" }
    ]
};

function startScan() {
    const brand = document.getElementById('brand').value;
    const cat = document.getElementById('category').value;
    const budget = parseFloat(document.getElementById('budget').value);
    
    // UI Reset
    document.getElementById('results').innerHTML = '';
    document.getElementById('statsBar').style.display = 'none';
    document.getElementById('loading').classList.add('active');

    setTimeout(() => {
        const data = DB[cat];
        let totalProfit = 0;

        data.forEach((item, i) => {
            // Logique de calcul améliorée
            const buyPrice = Math.floor(budget * (0.6 + Math.random() * 0.4));
            const estSellPrice = Math.round(buyPrice * item.m);
            const fees = 0.70 + (buyPrice * 0.05); // Commission Vinted
            const netProfit = estSellPrice - buyPrice - fees - 5; // -5€ frais de port estimé
            const roi = Math.round((netProfit / buyPrice) * 100);
            
            totalProfit += netProfit;

            const grade = netProfit > 40 ? 'A' : (netProfit > 20 ? 'B' : 'C');
            const color = grade === 'A' ? 'var(--score-a)' : (grade === 'B' ? 'var(--score-b)' : 'var(--score-c)');

            const cardHtml = `
                <div class="card" style="animation-delay: ${i*0.1}s">
                    <div class="grade-tag" style="background:${color}; color:#000">${grade}</div>
                    <div class="card-body">
                        <div class="img-container">
                            <img src="https://picsum.photos/seed/${item.n}${i}/200/300" onload="this.classList.add('loaded')">
                        </div>
                        <div class="info">
                            <div class="item-brand">${brand} • ${item.t}</div>
                            <div class="item-name">${item.n}</div>
                            <div class="price-row">
                                <span class="price-buy">${buyPrice}€</span>
                                <i data-lucide="arrow-right" size="12" style="color:var(--muted)"></i>
                                <span class="price-sell">${estSellPrice}€</span>
                            </div>
                            <div class="roi-badge">
                                <i data-lucide="trending-up" size="10" style="color:var(--accent)"></i>
                                PROFIT : +${Math.round(netProfit)}€ (${roi}%)
                            </div>
                        </div>
                    </div>
                    <div class="card-actions">
                        <a href="https://www.vinted.fr/catalog?search_text=${brand} ${item.n}" target="_blank" class="btn-main">SNIPER L'OFFRE</a>
                        <button class="btn-sec" onclick="alert('Ajouté aux favoris !')"><i data-lucide="bookmark" size="14"></i></button>
                    </div>
                </div>
            `;
            document.getElementById('results').innerHTML += cardHtml;
        });

        // Update Stats
        document.getElementById('loading').classList.remove('active');
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('statCount').innerText = data.length;
        document.getElementById('statAvgProfit').innerText = Math.round(totalProfit / data.length) + "€";
        lucide.createIcons();
    }, 1500);
}
</script>

</body>
</html>
