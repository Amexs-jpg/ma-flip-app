<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder - Resale</title>
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .logo { color: #d4ff3f; font-size: 24px; font-weight: bold; }
        .logo span { color: white; }
        .badge { background: #d4ff3f; color: black; padding: 5px 12px; border-radius: 20px; float: right; font-size: 10px; font-weight: 900; text-align: center; }
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        label { display: block; font-size: 10px; color: #777; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; }
        .input-box { background: #151515; border: 1px solid #252525; padding: 12px; border-radius: 10px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 14px; outline: none; }
        .input-box:focus { border-color: #d4ff3f; }
        .api-field { border: 1px solid #d4ff3f44; color: #d4ff3f; font-family: monospace; }
        .btn-scanner { background: #d4ff3f; color: black; width: 100%; border: none; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #results { margin-top: 30px; }
        .card { background: #151515; padding: 15px; margin-bottom: 12px; border-radius: 12px; text-align: left; border-left: 4px solid #d4ff3f; transition: 0.2s; }
        .card:hover { background: #1c1c1c; }
        .error-box { background: #111; border-radius: 12px; padding: 20px; margin-top: 20px; border: 1px solid #222; text-align: center; }
        .error-msg { color: #ff5f5f; font-family: monospace; font-size: 12px; text-align: left; margin-top: 10px; }
        a { text-decoration: none; color: inherit; }
    </style>
</head>
<body>

    <div class="badge">IA<br>POWERED</div>
    <div class="logo">Flip<span>Finder</span></div>
    <p style="font-size: 12px; color: #555; margin-top: 4px;">Détecteur d'opportunités · Liens directs Vinted</p>

    <div class="filters">
        <div><label>Marque</label><input type="text" class="input-box" id="marque" value="Nike"></div>
        <div><label>Budget Max</label><input type="text" class="input-box" id="budget" value="50€"></div>
        <div><label>Type</label><input type="text" class="input-box" id="type" value="T-shirts"></div>
        <div><label>Taille</label><input type="text" class="input-box" id="taille" value="S"></div>
    </div>

    <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">

    <label>Ta Clé API Google (AIza...)</label>
    <input type="password" id="api_key" class="input-box api-field" placeholder="Colle ta clé ici">

    <button class="btn-scanner" onclick="lancerScan()">🔍 SCANNER</button>

    <div id="results"></div>

<script>
    // 1. REMPLACE BIEN CET ID (Trouve le sur cse.google.com)
    const CX_ID = "71e2ce8bd66eb466a"; 

    async function lancerScan() {
        const resultsDiv = document.getElementById('results');
        const key = document.getElementById('api_key').value.trim();
        const marque = document.getElementById('marque').value;

        if (!key) { alert("Colle ta clé API !"); return; }
        
        resultsDiv.innerHTML = "<p style='color:#d4ff3f'>Scan en cours...</p>";

        try {
            const url = `https://www.googleapis.com/customsearch/v1?key=${key}&cx=${CX_ID}&q=site:vinted.fr ${marque}`;
            
            const response = await fetch(url);
            const data = await response.json();

            if (data.error) {
                // Si c'est un problème de clé
                if (data.error.message.includes("API key")) {
                    throw new Error("Clé API invalide ou mal configurée (Vérifie Google Cloud)");
                }
                throw new Error(data.error.message);
            }

            const items = data.items || [];

            if (items.length === 0) {
                resultsDiv.innerHTML = "<p>Aucun article trouvé. Vérifie ton ID CX.</p>";
            } else {
                resultsDiv.innerHTML = items.map(item => `
                    <div style="background:#151515; padding:15px; margin-bottom:10px; border-radius:12px; border-left:4px solid #d4ff3f; text-align:left;">
                        <a href="${item.link}" target="_blank" style="color:white; text-decoration:none;">
                            <strong>${item.title}</strong><br>
                            <span style="color:#d4ff3f; font-size:12px;">Voir l'offre →</span>
                        </a>
                    </div>
                `).join('');
            }
        } catch (error) {
            afficherErreur(error.message);
        }
    }

    function afficherErreur(msg) {
        document.getElementById('results').innerHTML = `
            <div style="background:#1a1a1a; padding:20px; border-radius:15px; border: 1px solid #333;">
                <span style="font-size:40px;">⚠️</span>
                <h3 style="color:white;">Erreur</h3>
                <p style="color:#ff5f5f; font-size:12px;">${msg}</p>
            </div>
        `;
    }
</script>
</body>
</html>
