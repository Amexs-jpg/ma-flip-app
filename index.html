<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlipFinder Pro - Visual Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@0.473.0/dist/umd/lucide.min.js"></script>
    <script>
        function initLucide() {
            if (typeof lucide !== 'undefined') { lucide.createIcons(); }
            else { setTimeout(initLucide, 80); }
        }
        document.addEventListener('DOMContentLoaded', initLucide);
    </script>
    <style>
        :root {
            --bg: #050505; --surface: #111; --card: #181818; --border: #282828;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #888; --score-a: #d4ff3f; --score-b: #f1a435; --score-c: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 16px 12px 100px; max-width: 600px; margin: auto;
        }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 1px; color: var(--accent); }
        .logo span { color: var(--text); }
        .badge { background: rgba(212, 255, 63, 0.1); color: var(--accent); font-size: 9px; font-weight: 800; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--accent); }

        .inventory-panel {
            background: var(--surface); border: 1px solid var(--accent); border-radius: 16px;
            padding: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .inv-info { display: flex; flex-direction: column; }
        .inv-label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
        .inv-amount { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--accent); line-height: 1; }
        .btn-reset-inv { background: transparent; border: 1px solid #333; color: #555; padding: 4px 8px; border-radius: 6px; font-size: 8px; cursor: pointer; }

        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        input, select {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 12px; border-radius: 12px; font-size: 14px; outline: none; transition: 0.2s;
            appearance: none; width: 100%;
        }
        input:focus, select:focus { border-color: var(--accent); background: #1c1c1c; }

        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 16px;
            border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .stats-bar { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin: 20px 0; overflow: hidden; }
        .stat { flex: 1; padding: 12px; border-right: 1px solid var(--border); text-align: center; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--accent); }
        .stat-label { font-size: 8px; color: var(--muted); text-transform: uppercase; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; margin-bottom: 16px; overflow: hidden; position: relative; animation: slideUp 0.4s ease both; }
        .grade-badge { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; z-index: 10; font-weight: bold; }
        .grade-a { background: var(--score-a); color: #000; box-shadow: 0 0 15px rgba(212,255,63,0.2); }
        .grade-b { background: var(--score-b); color: #000; }
        .grade-c { background: var(--score-c); color: #fff; }

        .card-top { display: flex; padding: 12px; gap: 12px; }
        .card-photo { width: 95px; height: 125px; background: #111; border-radius: 12px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.4s; }
        .card-photo img.loaded { opacity: 1; }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .card-tag { font-size: 8px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
        .card-title { font-size: 13px; font-weight: 600; color: #eee; margin-bottom: 4px; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .price-box { display: flex; align-items: baseline; gap: 6px; }
        .buy-price { font-family: 'Bebas Neue', sans-serif; color: #666; text-decoration: line-through; font-size: 1rem; }
        .sell-price { font-family: 'Bebas Neue', sans-serif; color: #fff; font-size: 1.6rem; }

        .profit-tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(212, 255, 63, 0.08); color: var(--accent); padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-top: 6px; border: 1px solid rgba(212, 255, 63, 0.2); }

        .card-footer { padding: 10px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); display: flex; gap: 6px; }
        .btn-action { flex: 1; padding: 10px 4px; border-radius: 10px; font-size: 10px; font-weight: 800; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; cursor: pointer; border: none; }
        .btn-vinted { background: var(--vinted); color: white; }
        .btn-acquire { background: var(--accent); color: #000; }

        .select-compare {
            flex: 0.6; padding: 10px 4px; border-radius: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ccc;
            font-size: 9px; font-weight: 700; cursor: pointer; appearance: none;
            text-align: center; outline: none;
        }

        .loading { display: none; text-align: center; padding: 30px; color: var(--muted); font-size: 11px; }
        .loading.active { display: block; }

        .size-tabs { display: flex; gap: 4px; margin-bottom: 4px; }
        .size-tab {
            flex: 1; padding: 6px; border-radius: 8px; font-size: 8px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; border: 1px solid var(--border);
            background: var(--card); color: var(--muted); text-align: center;
        }
        .size-tab.active { background: rgba(212,255,63,0.1); border-color: var(--accent); color: var(--accent); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge">V4.0 HD-VISUAL SCAN</div>
</div>

<div class="inventory-panel">
    <div class="inv-info">
        <span class="inv-label">Profit Cumulé</span>
        <span class="inv-amount" id="totalProfit">0€</span>
    </div>
    <div style="text-align: right;">
        <span class="inv-label" id="itemsCount">0 Items acquis</span><br>
        <button class="btn-reset-inv" onclick="resetInventory()">Effacer</button>
    </div>
</div>

<div class="filters">
    <div class="filter-group">
        <label><i data-lucide="tag" size="10"></i> Marque</label>
        <select id="marque-vetement">
            <option value="ALL">✨ TOUTES LES MARQUES</option>
            <optgroup label="── Streetwear ──">
                <option value="Carhartt">Carhartt WIP</option>
                <option value="Stussy">Stüssy</option>
                <option value="Palace">Palace</option>
                <option value="Supreme">Supreme</option>
                <option value="Bape">Bape</option>
                <option value="Kith">Kith</option>
                <option value="Aimé Leon Dore">Aimé Leon Dore</option>
                <option value="Noah">Noah</option>
            </optgroup>
            <optgroup label="── Sportswear ──">
                <option value="Nike">Nike</option>
                <option value="Adidas">Adidas</option>
                <option value="Jordan">Jordan</option>
                <option value="New Balance">New Balance</option>
                <option value="Puma">Puma</option>
                <option value="Asics">Asics</option>
                <option value="Reebok">Reebok</option>
                <option value="Under Armour">Under Armour</option>
            </optgroup>
            <optgroup label="── Luxury / Preppy ──">
                <option value="Ralph Lauren">Ralph Lauren</option>
                <option value="Tommy Hilfiger">Tommy Hilfiger</option>
                <option value="Lacoste">Lacoste</option>
                <option value="Fred Perry">Fred Perry</option>
                <option value="Burberry">Burberry</option>
                <option value="Stone Island">Stone Island</option>
                <option value="CP Company">CP Company</option>
            </optgroup>
            <optgroup label="── Vintage / Workwear ──">
                <option value="Levi's">Levi's</option>
                <option value="Wrangler">Wrangler</option>
                <option value="Lee">Lee</option>
                <option value="Dickies">Dickies</option>
                <option value="Timberland">Timberland</option>
                <option value="Patagonia">Patagonia</option>
                <option value="Arc'teryx">Arc'teryx</option>
                <option value="The North Face">The North Face</option>
            </optgroup>
        </select>
        <select id="marque-chaussure" style="display:none;">
            <option value="ALL">✨ TOUTES LES MARQUES</option>
            <optgroup label="── Sneakers Hype ──">
                <option value="Nike">Nike</option>
                <option value="Jordan">Jordan</option>
                <option value="Adidas">Adidas</option>
                <option value="New Balance">New Balance</option>
                <option value="Asics">Asics</option>
                <option value="Reebok">Reebok</option>
                <option value="Puma">Puma</option>
                <option value="Vans">Vans</option>
                <option value="Converse">Converse</option>
            </optgroup>
            <optgroup label="── Running / Trail ──">
                <option value="Salomon">Salomon</option>
                <option value="On Running">On Running</option>
                <option value="Hoka">Hoka</option>
                <option value="Saucony">Saucony</option>
                <option value="Brooks">Brooks</option>
                <option value="Mizuno">Mizuno</option>
            </optgroup>
            <optgroup label="── Boots / Casual ──">
                <option value="Timberland">Timberland</option>
                <option value="Dr. Martens">Dr. Martens</option>
                <option value="Birkenstock">Birkenstock</option>
                <option value="UGG">UGG</option>
                <option value="Clarks">Clarks</option>
                <option value="Crocs">Crocs</option>
            </optgroup>
        </select>
    </div>
    <div class="filter-group">
        <label><i data-lucide="wallet" size="10"></i> Budget Max</label>
        <input type="text" id="budget" value="65€">
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="layers" size="10"></i> Catégorie Ciblée</label>
        <select id="typeSelect">
            <option value="outerwear">Vestes & Blousons</option>
            <option value="tops" selected>Hauts (Hoodies, Sweats...)</option>
            <option value="bottoms">Pantalons (Double Knee...)</option>
            <option value="sneakers">Sneakers</option>
        </select>
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="maximize" size="10"></i> Taille</label>
        <div class="size-tabs">
            <div class="size-tab active" id="tab-vetement" onclick="switchSizeTab('vetement')">👕 Vêtement</div>
            <div class="size-tab" id="tab-chaussure" onclick="switchSizeTab('chaussure')">👟 Chaussure</div>
        </div>
        <select id="taille-vetement">
            <option value="S">S</option><option value="M">M</option><option value="L" selected>L</option><option value="XL">XL</option><option value="XXL">XXL</option><option value="W32">W32 (Jeans)</option>
        </select>
        <select id="taille-chaussure" style="display:none;">
            <option value="41">41</option><option value="42">42</option><option value="43" selected>43</option><option value="44">44</option><option value="45">45</option>
        </select>
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="sparkles" size="10"></i> État</label>
        <select id="condition">
            <option value="very_good">Très bon état</option>
            <option value="good" selected>Bon état</option>
            <option value="new">Neuf avec étiquette</option>
        </select>
    </div>
</div>

<button class="btn-scan" id="scanBtn" onclick="lancerScan()">
    <i data-lucide="zap" size="18"></i> ANALYSER LE FLUX VISUEL
</button>

<div class="loading" id="loading">Calcul des marges en cours...</div>

<div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Offres</div></div>
    <div class="stat"><div class="stat-val" id="statProfit">0€</div><div class="stat-label">Gain Moyen</div></div>
</div>

<div id="results"></div>

<script>
let inventory = JSON.parse(localStorage.getItem('ff_inventory')) || { profit: 0, count: 0 };

function updateInvUI() {
    document.getElementById('totalProfit').textContent = inventory.profit + '€';
    document.getElementById('itemsCount').textContent = inventory.count + ' Items acquis';
    localStorage.setItem('ff_inventory', JSON.stringify(inventory));
}

function addToInventory(profit, btn) {
    inventory.profit += profit;
    inventory.count += 1;
    updateInvUI();
    btn.innerHTML = '<i data-lucide="check" size="12"></i> ACQUIS';
    btn.style.opacity = "0.5";
    btn.style.pointerEvents = "none";
    if (typeof lucide !== 'undefined') lucide.createIcons();
}

function resetInventory() {
    if(confirm("Réinitialiser ?")) {
        inventory = { profit: 0, count: 0 };
        updateInvUI();
    }
}

const marketMatrix = {
    "CARHARTT": {
        "outerwear": [{ n:"Detroit Jacket", img:"carhartt+detroit", vinted:[35,55], sell:[85,115] }, { n:"Active Jacket", img:"carhartt+active", vinted:[25,40], sell:[65,85] }],
        "tops": [{ n:"Hoodie Chase", img:"carhartt+hoodie", vinted:[12,22], sell:[35,50] }, { n:"Sweat Script", img:"carhartt+sweatshirt", vinted:[15,25], sell:[40,55] }],
        "bottoms": [{ n:"Double Knee", img:"carhartt+double+knee", vinted:[30,50], sell:[75,110] }, { n:"Cargo", img:"carhartt+cargo", vinted:[20,35], sell:[50,70] }]
    },
    "NIKE": {
        "outerwear": [{ n:"Veste Nocta", img:"nike+nocta", vinted:[50,80], sell:[110,140] }, { n:"Vintage 90s", img:"nike+vintage+jacket", vinted:[15,25], sell:[45,65] }],
        "tops": [{ n:"Hoodie Swoosh", img:"nike+hoodie", vinted:[10,20], sell:[30,45] }],
        "sneakers": [{ n:"Dunk Low", img:"nike+dunk", vinted:[40,65], sell:[85,110] }, { n:"Air Force 1", img:"nike+af1", vinted:[30,50], sell:[65,85] }]
    },
    "STUSSY": {
        "tops": [{ n:"8 Ball Hoodie", img:"stussy+8ball", vinted:[40,70], sell:[120,160] }, { n:"Basic Tee", img:"stussy+tee", vinted:[12,22], sell:[35,50] }],
        "bottoms": [{ n:"Big Ol Jeans", img:"stussy+jeans", vinted:[35,60], sell:[85,120] }]
    },
    "RALPH LAUREN": {
        "tops": [{ n:"Pull Cable Knit", img:"ralph+lauren+sweater", vinted:[15,30], sell:[45,70] }, { n:"Chemise Oxford", img:"ralph+lauren+shirt", vinted:[8,15], sell:[25,40] }]
    },
    "DEFAULT": {
        "outerwear": [{ n:"Veste Vintage", img:"vintage+jacket", vinted:[10,20], sell:[35,55] }],
        "tops": [{ n:"Hoodie Street", img:"hoodie+streetwear", vinted:[8,15], sell:[25,40] }],
        "bottoms": [{ n:"Jeans Baggy", img:"baggy+jeans", vinted:[10,20], sell:[30,50] }],
        "sneakers": [{ n:"Sneakers Retro", img:"sneakers+retro", vinted:[20,40], sell:[55,85] }]
    }
};

function switchSizeTab(tab) {
    document.getElementById('tab-vetement').classList.toggle('active', tab === 'vetement');
    document.getElementById('tab-chaussure').classList.toggle('active', tab === 'chaussure');
    document.getElementById('taille-vetement').style.display  = tab === 'vetement' ? '' : 'none';
    document.getElementById('taille-chaussure').style.display = tab === 'chaussure' ? '' : 'none';
    document.getElementById('marque-vetement').style.display  = tab === 'vetement' ? '' : 'none';
    document.getElementById('marque-chaussure').style.display = tab === 'chaussure' ? '' : 'none';
    
    // AUTO CATEGORY
    document.getElementById('typeSelect').value = (tab === 'chaussure') ? 'sneakers' : 'tops';
}

function openCompare(platform, query) {
    const q = encodeURIComponent(query);
    const urls = { 'lbc': `https://www.leboncoin.fr/recherche?text=${q}`, 'ebay': `https://www.ebay.fr/sch/i.html?_nkw=${q}`, 'stockx': `https://stockx.com/fr-fr/search?s=${q}` };
    if(urls[platform]) window.open(urls[platform], '_blank');
}

function lancerScan() {
    const isCh = document.getElementById('tab-chaussure').classList.contains('active');
    const marque = isCh ? document.getElementById('marque-chaussure').value.toUpperCase() : document.getElementById('marque-vetement').value.toUpperCase();
    const cat = document.getElementById('typeSelect').value;
    const budget = parseInt(document.getElementById('budget').value) || 65;
    const size = isCh ? document.getElementById('taille-chaussure').value : document.getElementById('taille-vetement').value;

    document.getElementById('results').innerHTML = '';
    document.getElementById('loading').classList.add('active');

    setTimeout(() => {
        let pool = [];
        if (marque === "ALL") {
            Object.keys(marketMatrix).filter(b => b !== "DEFAULT").forEach(b => {
                (marketMatrix[b][cat] || []).forEach(m => pool.push({...m, brand: b}));
            });
        } else {
            const models = (marketMatrix[marque] && marketMatrix[marque][cat]) ? marketMatrix[marque][cat] : marketMatrix["DEFAULT"][cat];
            models.forEach(m => pool.push({...m, brand: marque}));
        }

        let html = '';
        pool.forEach((it, i) => {
            const buy = Math.min(it.vinted[0] + Math.floor(Math.random()*10), budget);
            const sell = it.sell[1];
            const profit = sell - buy - 5;
            const grade = (sell/buy > 2) ? 'A' : 'B';
            const query = `${it.brand} ${it.n} ${size}`;
            const vLink = `https://www.vinted.fr/catalog?search_text=${encodeURIComponent(query)}&order=newest_first`;

            html += `
            <div class="card">
                <div class="grade-badge grade-${grade.toLowerCase()}">${grade}</div>
                <div class="card-top">
                    <div class="card-photo"><img src="https://loremflickr.com/200/250/${it.img}?lock=${i+50}" onload="this.classList.add('loaded')"></div>
                    <div class="card-info">
                        <div class="card-tag">${cat.toUpperCase()}</div>
                        <div class="card-title">${it.brand} ${it.n}</div>
                        <div class="price-box">
                            <span class="buy-price">${buy}€</span>
                            <span class="sell-price">${sell}€</span>
                        </div>
                        <div class="profit-tag">+${profit}€ Net</div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="${vLink}" target="_blank" class="btn-action btn-vinted">VINTED</a>
                    <button class="btn-action btn-acquire" onclick="addToInventory(${profit}, this)">ACQUÉRIR</button>
                    <select class="select-compare" onchange="openCompare(this.value, '${it.brand} ${it.n}'); this.value='';">
                        <option value="">COMP.</option>
                        <option value="lbc">LBC</option>
                        <option value="ebay">EBAY</option>
                    </select>
                </div>
            </div>`;
        });

        document.getElementById('results').innerHTML = html;
        document.getElementById('loading').classList.remove('active');
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('statCount').textContent = pool.length;
        document.getElementById('statProfit').textContent = "28€";
        if (typeof lucide !== 'undefined') lucide.createIcons();
    }, 800);
}
document.addEventListener('DOMContentLoaded', updateInvUI);
</script>
</body>
</html>
