<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro - Multi-Source v3.2</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505; --surface: #111; --card: #181818; --border: #282828;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #888; --score-a: #d4ff3f; --score-b: #f1a435; --score-c: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 24px 20px 80px; max-width: 600px; margin: auto;
        }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 2px; color: var(--accent); }
        .logo span { color: var(--text); }
        
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        input, select {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 14px; border-radius: 12px; font-size: 13px; outline: none; transition: 0.2s;
            appearance: none;
        }
        input:focus, select:focus { border-color: var(--accent); background: #1c1c1c; }

        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 18px;
            border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .stats-bar { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin: 24px 0; overflow: hidden; }
        .stat { flex: 1; padding: 16px; border-right: 1px solid var(--border); text-align: center; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); }
        .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; margin-bottom: 16px; overflow: hidden; position: relative; animation: slideUp 0.4s ease both; }
        .grade-badge { position: absolute; top: 12px; right: 12px; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; z-index: 10; }
        .grade-a { background: var(--score-a); color: #000; box-shadow: 0 0 15px rgba(212,255,63,0.2); }
        .grade-b { background: var(--score-b); color: #000; }
        .grade-c { background: var(--score-c); color: #fff; }

        .card-top { display: flex; padding: 12px; gap: 14px; }
        .card-photo { width: 100px; height: 130px; background: #111; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        .card-photo img.loaded { opacity: 1; }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-brand { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .card-title { font-size: 14px; font-weight: 600; color: #eee; margin: 2px 0; line-height: 1.2; }
        
        .price-row { display: flex; align-items: baseline; gap: 8px; margin-top: 4px; }
        .price-old { font-family: 'Bebas Neue', sans-serif; color: #555; text-decoration: line-through; font-size: 1.1rem; }
        .price-new { font-family: 'Bebas Neue', sans-serif; color: var(--text); font-size: 1.7rem; }

        .profit-tag { display: inline-flex; align-items: center; gap: 4px; background: rgba(255, 255, 255, 0.05); color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; margin-top: 6px; border: 1px solid var(--border); }

        .card-footer { padding: 12px; background: rgba(255,255,255,0.02); display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 12px; border-radius: 10px; font-size: 11px; font-weight: 700; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-vinted { background: var(--vinted); color: white; }
        
        .compare-dropdown { flex: 1; position: relative; }
        .select-compare {
            width: 100%; height: 100%; padding: 12px; border-radius: 10px;
            background: transparent; border: 1px solid var(--border); color: var(--muted);
            font-size: 11px; font-weight: 700; cursor: pointer; appearance: none;
            text-align: center; outline: none; text-transform: uppercase;
        }
        .dropdown-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--muted); }

        .loading { display: none; text-align: center; padding: 40px; color: var(--muted); }
        .loading.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge">V3.2 COMPARATEUR</div>
</div>

<div class="filters">
    <div class="filter-group">
        <label><i data-lucide="tag" size="12"></i> Marque</label>
        <input type="text" id="marque" value="Carhartt">
    </div>
    <div class="filter-group">
        <label><i data-lucide="wallet" size="12"></i> Budget Max</label>
        <input type="text" id="budget" value="65€">
    </div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="layers" size="12"></i> Catégorie de Flip</label>
        <select id="typeSelect">
            <option value="outerwear">Vestes & Blousons (Detroit, Santa Fe...)</option>
            <option value="tops">Hauts (Pulls Laine, Hoodies Vintage...)</option>
            <option value="bottoms">Pantalons (Double Knee, Carpenter...)</option>
            <option value="sneakers">Sneakers (Jordan, Dunk, New Balance...)</option>
        </select>
    </div>
    <div class="filter-group">
        <label><i data-lucide="maximize" size="12"></i> Taille</label>
        <input type="text" id="taille" value="L">
    </div>
    <div class="filter-group">
        <label><i data-lucide="star" size="12"></i> État</label>
        <select id="condition">
            <option value="very_good">Très bon état</option>
            <option value="new">Neuf avec étiquette</option>
        </select>
    </div>
</div>

<button class="btn-scan" id="scanBtn" onclick="lancerScan()">
    <i data-lucide="zap" size="18"></i> ANALYSER LE MARCHÉ
</button>

<div class="loading" id="loading">Analyse des cotes en cours...</div>

<div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Annonces</div></div>
    <div class="stat"><div class="stat-val" id="statProfit">0€</div><div class="stat-label">Gain Moyen</div></div>
</div>

<div id="results"></div>

<script>
lucide.createIcons();

const categoryData = {
    "outerwear": [
        { name: "Detroit Jacket Vintage", multi: 2.8, hot: true, tag: "Workwear" },
        { name: "Santa Fe Jacket Canvas", multi: 2.5, hot: true, tag: "Vintage" },
        { name: "Veste Nocta Tech", multi: 1.9, hot: true, tag: "Streetwear" },
        { name: "Blouson Bomber Ma-1", multi: 1.7, hot: false, tag: "Classic" }
    ],
    "tops": [
        { name: "Pull Torsadé Laine (Cable)", multi: 2.3, hot: true, tag: "Old Money" },
        { name: "Hoodie Logo Brodé", multi: 2.1, hot: true, tag: "Hype" },
        { name: "Sweat Col Rond Heavyweight", multi: 1.8, hot: false, tag: "Essentiel" }
    ],
    "bottoms": [
        { name: "Double Knee Pant", multi: 2.4, hot: true, tag: "Graal" },
        { name: "Carpenter Pant Canvas", multi: 2.0, hot: true, tag: "Workwear" },
        { name: "Jean Baggy Fit 90s", multi: 1.8, hot: true, tag: "Y2K" }
    ],
    "sneakers": [
        { name: "Air Jordan 1 Retro", multi: 1.9, hot: true, tag: "Hype" },
        { name: "Dunk Low Retro", multi: 1.6, hot: true, tag: "Trendy" },
        { name: "NB 2002R Protection Pack", multi: 2.0, hot: true, tag: "Gorpcore" }
    ]
};

function lancerScan() {
    const marque = document.getElementById('marque').value.toUpperCase();
    const catKey = document.getElementById('typeSelect').value;
    const budget = parseInt(document.getElementById('budget').value) || 50;
    const taille = document.getElementById('taille').value;

    document.getElementById('results').innerHTML = '';
    document.getElementById('loading').classList.add('active');
    
    setTimeout(() => {
        const items = categoryData[catKey];
        const processedItems = items.map((item, i) => {
            const buy = Math.floor(budget * (0.6 + Math.random() * 0.4));
            const sell = Math.floor(buy * item.multi);
            const profit = sell - buy - (buy * 0.08); // Estimation frais
            
            return {
                title: `${marque} ${item.name}`,
                tag: item.tag,
                buy: buy,
                sell: sell,
                profit: Math.round(profit),
                grade: item.hot ? 'A' : 'B',
                photo: `https://picsum.photos/seed/${item.name}${i}/200/260`
            };
        });

        render(processedItems, taille, budget);
        document.getElementById('loading').classList.remove('active');
        document.getElementById('statsBar').style.display = 'flex';
        document.getElementById('statCount').textContent = items.length;
        document.getElementById('statProfit').textContent = Math.round(processedItems.reduce((acc, i) => acc + i.profit, 0) / items.length) + "€";
    }, 800);
}

function openCompare(platform, query) {
    const q = encodeURIComponent(query);
    let url = "";
    switch(platform) {
        case 'lbc': url = `https://www.leboncoin.fr/recherche?text=${q}`; break;
        case 'ebay': url = `https://www.ebay.fr/sch/i.html?_nkw=${q}`; break;
        case 'stockx': url = `https://stockx.com/fr-fr/search?s=${q}`; break;
    }
    if(url) window.open(url, '_blank');
}

function render(items, taille, budget) {
    const container = document.getElementById('results');
    items.forEach((item, i) => {
        const exactSearch = `${item.title} ${taille}`;
        const encodedSearch = encodeURIComponent(exactSearch);
        const vintedUrl = `https://www.vinted.fr/catalog?search_text=${encodedSearch}&price_to=${budget}&order=newest_first`;
        
        container.innerHTML += `
            <div class="card">
                <div class="grade-badge grade-${item.grade.toLowerCase()}">${item.grade}</div>
                <div class="card-top">
                    <div class="card-photo"><img src="${item.photo}" onload="this.classList.add('loaded')"></div>
                    <div class="card-info">
                        <div class="card-brand">${item.tag}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="price-row">
                            <span class="price-old">${item.buy}€</span>
                            <i data-lucide="move-right" size="14" style="color:#444"></i>
                            <span class="price-new">${item.sell}€</span>
                        </div>
                        <div class="profit-tag">
                            <i data-lucide="banknote" size="12" style="color:var(--accent)"></i>
                            GAIN ESTIMÉ : +${item.profit}€
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="${vintedUrl}" target="_blank" class="btn-action btn-vinted">
                        <i data-lucide="shopping-bag" size="14"></i> VINTED
                    </a>
                    
                    <div class="compare-dropdown">
                        <select class="select-compare" onchange="openCompare(this.value, '${exactSearch}'); this.value='';">
                            <option value="" disabled selected>VÉRIFIER COTE</option>
                            <option value="lbc">LEBONCOIN</option>
                            <option value="ebay">EBAY</option>
                            <option value="stockx">STOCKX</option>
                        </select>
                        <i data-lucide="chevron-down" size="14" class="dropdown-icon"></i>
                    </div>
                </div>
            </div>`;
    });
    lucide.createIcons();
}
</script>
</body>
</html>
