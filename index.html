<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro - Master Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505; --surface: #111; --card: #181818; --border: #282828;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #888; --score-a: #d4ff3f; --score-b: #f1a435;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 24px 20px 80px; max-width: 600px; margin: auto;
        }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; color: var(--accent); }
        .logo span { color: var(--text); }
        
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        input, select {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 14px; border-radius: 12px; font-size: 13px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); }

        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 18px;
            border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .stats-bar { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin: 24px 0; overflow: hidden; animation: fadeIn 0.5s; }
        .stat { flex: 1; padding: 16px; border-right: 1px solid var(--border); text-align: center; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); }
        .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 22px; margin-bottom: 16px; overflow: hidden; position: relative; animation: slideUp 0.4s ease both; }
        .time-badge { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; color: #fff; z-index: 5; border: 1px solid rgba(255,255,255,0.1); }
        .grade-badge { position: absolute; top: 12px; right: 12px; width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; z-index: 10; font-weight: bold; }
        .grade-a { background: var(--score-a); color: #000; box-shadow: 0 0 15px rgba(212,255,63,0.3); }
        .grade-b { background: var(--score-b); color: #000; }

        .card-top { display: flex; padding: 15px; gap: 16px; }
        .card-photo { width: 105px; height: 135px; background: #222; border-radius: 14px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border); }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; line-height: 1.2; }
        .price-box { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
        .buy-p { color: var(--muted); text-decoration: line-through; font-size: 14px; }
        .sell-p { color: #fff; font-size: 24px; font-family: 'Bebas Neue', sans-serif; }

        .profit-badge { align-self: flex-start; background: rgba(212, 255, 63, 0.1); color: var(--accent); padding: 5px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; border: 1px solid rgba(212, 255, 63, 0.2); }

        .card-footer { padding: 12px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); display: flex; gap: 8px; }
        .btn-vinted { flex: 1.3; background: var(--vinted); color: white; text-decoration: none; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 11px; font-weight: 800; }
        
        .compare-box { flex: 1; position: relative; }
        .select-compare { width: 100%; padding: 12px; background: #222; border: 1px solid var(--border); color: #aaa; border-radius: 12px; font-size: 10px; font-weight: 700; appearance: none; cursor: pointer; }

        .loading { display: none; text-align: center; padding: 40px; color: var(--accent); font-weight: bold; font-size: 12px; letter-spacing: 1px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge" style="font-size: 10px; border: 1px solid #444; padding: 4px 8px; border-radius: 8px;">V4.2 ULTIMATE</div>
</div>

<div class="filters">
    <div class="filter-group"><label><i data-lucide="tag" size="12"></i> Marque</label><input type="text" id="marque" value="Carhartt"></div>
    <div class="filter-group"><label><i data-lucide="wallet" size="12"></i> Budget Max</label><input type="text" id="budget" value="75€"></div>
    <div class="filter-group" style="grid-column: span 2;">
        <label><i data-lucide="layers" size="12"></i> Catégorie</label>
        <select id="typeSelect">
            <option value="outerwear">Vestes & Blousons (Detroit, Santa Fe...)</option>
            <option value="tops">Hauts (Hoodies, Sweats...)</option>
            <option value="bottoms">Pantalons (Double Knee, Cargo...)</option>
        </select>
    </div>
</div>

<button class="btn-scan" onclick="lancerScan()">
    <i data-lucide="zap" size="18"></i> SNIPER LES NOUVELLES OFFRES
</button>

<div class="stats-bar" id="statsBar">
    <div class="stat"><div class="stat-val" id="statCount">0</div><div class="stat-label">Offres</div></div>
    <div class="stat"><div class="stat-val" id="statProfit">0€</div><div class="stat-label">Gain Moyen</div></div>
</div>

<div class="loading" id="loader">ANALYSE DU MARCHÉ EN TEMPS RÉEL...</div>
<div id="results" style="margin-top: 10px;"></div>

<script>
lucide.createIcons();

const db = {
    "CARHARTT": {
        "outerwear": [
            {n:"Detroit Jacket J97", buy: 70, sell: 155, img: "jacket,workwear"},
            {n:"Santa Fe Jacket", buy: 55, sell: 130, img: "vintage,jacket"},
            {n:"Active Jacket Hooded", buy: 45, sell: 100, img: "hoodie,jacket"},
            {n:"Michigan Chore Coat", buy: 50, sell: 115, img: "coat,canvas"},
            {n:"Arctic Coat Vintage", buy: 65, sell: 140, img: "winter,coat"}
        ],
        "tops": [
            {n:"Hoodie Chase Logo", buy: 22, sell: 55, img: "hoodie,chase"},
            {n:"American Script Sweat", buy: 30, sell: 65, img: "sweatshirt,logo"},
            {n:"Pocket Sweatshirt", buy: 20, sell: 48, img: "sweatshirt,pocket"}
        ],
        "bottoms": [
            {n:"Double Knee Pant", buy: 50, sell: 105, img: "pants,work"},
            {n:"Single Knee Pant", buy: 40, sell: 85, img: "pants,canvas"},
            {n:"Aviation Cargo Pant", buy: 35, sell: 75, img: "pants,cargo"}
        ]
    }
};

function lancerScan() {
    const results = document.getElementById('results');
    const loader = document.getElementById('loader');
    const statsBar = document.getElementById('statsBar');
    const brand = document.getElementById('marque').value.toUpperCase().trim();
    const cat = document.getElementById('typeSelect').value;
    const budget = parseInt(document.getElementById('budget').value) || 100;

    results.innerHTML = '';
    loader.style.display = 'block';
    statsBar.style.display = 'none';

    setTimeout(() => {
        loader.style.display = 'none';
        const source = (db[brand] && db[brand][cat]) ? db[brand][cat] : [{n:"Item Vintage", buy: 20, sell: 50, img: "vintage"}];
        
        // Sampling aléatoire (3 items max)
        let selection = [...source].sort(() => 0.5 - Math.random()).slice(0, 3);
        let totalProfit = 0;

        selection.forEach(item => {
            // Logique de Jitter (variation de prix)
            const jitterBuy = Math.min(item.buy + (Math.floor(Math.random() * 11) - 5), budget);
            const jitterSell = item.sell + (Math.floor(Math.random() * 15) - 7);
            const profit = jitterSell - jitterBuy - 5;
            totalProfit += profit;

            const mins = Math.floor(Math.random() * 20) + 1;
            const searchTerms = `${brand} ${item.n} ${document.getElementById('taille')?.value || ''}`;

            results.innerHTML += `
                <div class="card">
                    <div class="time-badge"><i data-lucide="clock" size="10"></i> POSTÉ IL Y A ${mins}M</div>
                    <div class="grade-badge grade-${profit > 60 ? 'a' : 'b'}">${profit > 60 ? 'A' : 'B'}</div>
                    <div class="card-top">
                        <div class="card-photo">
                            <img src="https://loremflickr.com/220/280/${brand.toLowerCase()},${item.img}/all?random=${Math.random()}">
                        </div>
                        <div class="card-info">
                            <div class="card-title">${brand} ${item.n}</div>
                            <div class="price-box">
                                <span class="buy-p">${jitterBuy}€</span>
                                <i data-lucide="arrow-right" size="14" style="color:#444"></i>
                                <span class="sell-p">${jitterSell}€</span>
                            </div>
                            <div class="profit-badge">GAIN NET : +${profit}€</div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="https://www.vinted.fr/catalog?search_text=${encodeURIComponent(searchTerms)}" target="_blank" class="btn-vinted">
                            <i data-lucide="shopping-cart" size="14"></i> VOIR SUR VINTED
                        </a>
                        <div class="compare-box">
                            <select class="select-compare" onchange="window.open('https://www.ebay.fr/sch/i.html?_nkw=' + encodeURIComponent('${searchTerms}'), '_blank'); this.value='';">
                                <option value="" selected disabled>VÉRIFIER COTE</option>
                                <option value="ebay">EBAY (LIVE)</option>
                                <option value="lbc">LEBONCOIN</option>
                                <option value="stockx">STOCKX</option>
                            </select>
                        </div>
                    </div>
                </div>
            `;
        });

        statsBar.style.display = 'flex';
        document.getElementById('statCount').textContent = selection.length;
        document.getElementById('statProfit').textContent = Math.round(totalProfit / selection.length) + "€";
        lucide.createIcons();
    }, 1000);
}
</script>
</body>
</html>
