<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro</title>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --primary: #8bc34a; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { color: var(--primary); font-weight: bold; font-size: 1.5rem; }
        .settings-btn { background: #222; border: none; color: #aaa; padding: 8px; border-radius: 5px; }
        input { width: 100%; background: #222; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; margin-bottom: 10px; box-sizing: border-box; }
        #scanBtn { width: 100%; background: var(--primary); border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .card { background: var(--card); border-radius: 12px; margin-top: 15px; padding: 15px; border: 1px solid #333; }
        .btn-vinted { display: block; text-align: center; background: #007782; color: white; text-decoration: none; padding: 10px; border-radius: 6px; margin-top: 10px; }
        #loader { display: none; text-align: center; margin: 20px 0; }
    </style>
</head>
<body>

<header>
    <div class="logo">FLIPFINDER</div>
    <button class="settings-btn" onclick="toggleSettings()">⚙️ CLÉ</button>
</header>

<div id="settingsPanel" style="display:none; margin-bottom:20px;">
    <input type="password" id="apiKeyInput" placeholder="Colle ta clé AIza...">
    <button onclick="saveKey()" style="width:100%; background:white; border:none; padding:8px; border-radius:5px;">SAUVEGARDER</button>
</div>

<input type="text" id="brands" placeholder="Nike, Adidas...">
<button id="scanBtn" onclick="scan()">🔍 SCANNER LES PÉPITES</button>

<div id="loader">🤖 Analyse IA en cours...</div>
<div id="resultsContainer"></div>

<script>
    function toggleSettings() {
        const p = document.getElementById('settingsPanel');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function saveKey() {
        localStorage.setItem('flip_gemini_key', document.getElementById('apiKeyInput').value.trim());
        alert("Clé enregistrée !");
        toggleSettings();
    }

    async function scan() {
        const key = localStorage.getItem('flip_gemini_key');
        if (!key) { alert("Mets ta clé !"); return; }

        document.getElementById('loader').style.display = 'block';
        const container = document.getElementById('resultsContainer');
        container.innerHTML = '';

        try {
            // URL MODIFIÉE : On utilise la v1beta mais avec un fallback sur le nom du modèle
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`;
            
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Donne moi 3 idées de flip Vinted (Nike, Adidas). Réponds uniquement en JSON format: {\"items\":[{\"title\":\"Veste\",\"brand\":\"Nike\",\"buyPrice\":20,\"sellPrice\":50}]}" }] }] })
            });

            const data = await response.json();
            if (data.error) throw new Error(data.error.message);

            const text = data.candidates[0].content.parts[0].text;
            const json = JSON.parse(text.match(/\{[\s\S]*\}/)[0]);
            
            json.items.forEach(item => {
                container.innerHTML += `
                    <div class="card">
                        <h3>${item.brand} - ${item.title}</h3>
                        <p>Achat: ${item.buyPrice}€ | Revente: ${item.sellPrice}€</p>
                        <a href="https://www.vinted.fr/catalog?search_text=${item.brand}+${item.title}" class="btn-vinted">Chercher</a>
                    </div>`;
            });
        } catch (err) {
            alert("Erreur: " + err.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
