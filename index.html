<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder - Resale</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .logo { color: #d4ff3f; font-size: 24px; font-weight: bold; }
        .logo span { color: white; }
        .badge { background: #d4ff3f; color: black; padding: 5px 10px; border-radius: 20px; float: right; font-size: 10px; font-weight: bold; text-align: center; }
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        label { display: block; font-size: 10px; color: #666; margin-bottom: 5px; text-transform: uppercase; }
        .input-box { background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; width: 100%; box-sizing: border-box; margin-bottom: 15px; font-size: 14px; }
        .api-field { border: 1px solid #d4ff3f55; color: #d4ff3f; font-family: monospace; }
        .btn-scanner { background: #d4ff3f; color: black; width: 100%; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        #results { margin-top: 30px; text-align: center; }
        .error-box { background: #1a1a1a; border-radius: 10px; padding: 20px; margin-top: 20px; border: 1px solid #333; }
        .error-msg { color: #ff6b6b; font-family: monospace; font-size: 12px; text-align: left; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="badge">IA<br>POWERED</div>
    <div class="logo">Flip<span>Finder</span></div>
    <p style="font-size: 12px; color: #666;">Détecteur d'opportunités · Liens directs Vinted</p>

    <div class="filters">
        <div><label>Marque</label><input type="text" class="input-box" id="marque" value="Nike"></div>
        <div><label>Budget Max</label><input type="text" class="input-box" id="budget" value="50€"></div>
        <div><label>Type</label><input type="text" class="input-box" id="type" value="T-shirts"></div>
        <div><label>Taille</label><input type="text" class="input-box" id="taille" value="S"></div>
    </div>

    <hr style="border: 0; border-top: 1px dashed #333; margin: 20px 0;">

    <label>Lien de l'API / Endpoint</label>
    <input type="text" id="api_url" class="input-box api-field" placeholder="https://votre-api.com/search" value="">

    <button class="btn-scanner" onclick="lancerScan()">🔍 SCANNER</button>

    <div id="results"></div>

    <script>
        async function lancerScan() {
            const resultsDiv = document.getElementById('results');
            const url = document.getElementById('api_url').value.trim();

            if (!url) {
                afficherErreur("Veuillez entrer une URL d'API valide.");
                return;
            }

            if (!url.startsWith('http')) {
                afficherErreur("L'URL doit commencer par http:// ou https://");
                return;
            }

            resultsDiv.innerHTML = "<p>Connexion au serveur...</p>";

            try {
                const response = await fetch(url);
                
                if (response.status === 404) {
                    throw new Error("Erreur 404 : L'adresse de l'API est introuvable.");
                }
                
                if (!response.ok) {
                    throw new Error("Erreur Serveur: " + response.status);
                }
                
                const data = await response.json();
                const produits = Array.isArray(data) ? data : (data.items || []);

                if (produits.length === 0) {
                    afficherErreur("Aucun produit trouvé.");
                } else {
                    resultsDiv.innerHTML = produits.map(p => `
                        <div style="background:#1a1a1a; padding:15px; margin-bottom:10px; border-radius:10px; text-align:left; border-left: 4px solid #d4ff3f;">
                            <strong>${p.nom || 'Produit'}</strong> - ${p.prix || '0'}€
                        </div>
                    `).join('');
                }

            } catch (error) {
                afficherErreur(error.message);
            }
        }

        function afficherErreur(msg) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div style="margin-top: 20px;">
                    <span style="font-size: 50px;">⚠️</span>
                    <h2 style="margin:10px 0;">Erreur</h2>
                    <div class="error-box">
                        <p style="color:#666; font-size:11px; text-align:left; margin:0;">Console Messages</p>
                        <p class="error-msg">Error: ${msg}</p>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
