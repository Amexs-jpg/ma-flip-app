<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlipFinder Pro - Resale Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505; --surface: #111; --card: #181818; --border: #282828;
            --accent: #d4ff3f; --vinted: #09b1ba; --text: #ffffff;
            --muted: #888; --good: #4caf50; --warn: #f1a435; --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg); color: var(--text);
            font-family: 'DM Sans', sans-serif; min-height: 100vh;
            padding: 24px 20px 80px; max-width: 600px; margin: auto;
        }

        /* Header */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 2px; color: var(--accent); }
        .logo span { color: var(--text); }
        .badge { 
            background: rgba(212, 255, 63, 0.1); color: var(--accent); 
            font-size: 10px; font-weight: 800; padding: 6px 12px; 
            border-radius: 20px; border: 1px solid var(--accent);
        }

        /* Filters */
        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; }
        input {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 14px; border-radius: 12px; font-size: 14px; outline: none; transition: 0.2s;
        }
        input:focus { border-color: var(--accent); background: #1c1c1c; }

        /* Button */
        .btn-scan {
            background: var(--accent); color: #000; width: 100%; border: none; padding: 18px;
            border-radius: 16px; font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
            letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-scan:active { transform: scale(0.98); }
        .btn-scan:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Stats Bar */
        .stats-bar {
            display: none; background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; margin: 24px 0; overflow: hidden; animation: fadeIn 0.5s ease;
        }
        .stat { flex: 1; padding: 16px; border-right: 1px solid var(--border); text-align: center; }
        .stat:last-child { border-right: none; }
        .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--accent); line-height: 1.2; }
        .stat-label { font-size: 9px; color: var(--muted); text-transform: uppercase; font-weight: 600; }

        /* Cards */
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 18px;
            margin-bottom: 16px; overflow: hidden; animation: slideUp 0.4s ease both;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .card-top { display: flex; padding: 12px; gap: 14px; }
        .card-photo { width: 110px; height: 140px; background: #111; border-radius: 12px; overflow: hidden; position: relative; flex-shrink: 0; }
        .card-photo img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        .card-photo img.loaded { opacity: 1; }
        
        .card-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-brand { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
        .card-title { font-size: 14px; font-weight: 500; color: #eee; margin-bottom: 8px; }
        
        .price-container { display: flex; align-items: baseline; gap: 10px; }
        .price-buy { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: #777; text-decoration: line-through; }
        .price-sell { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--text); }
        
        .profit-tag { 
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(76, 175, 80, 0.15); color: #4caf50; 
            padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; margin-top: 6px;
        }

        .card-footer { padding: 12px; background: rgba(255,255,255,0.02); display: flex; gap: 10px; }
        .btn-action { 
            flex: 1; padding: 12px; border-radius: 10px; font-size: 12px; font-weight: 700; 
            text-decoration: none; text-align: center; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn-vinted { background: var(--vinted); color: white; }
        .btn-lbc { background: transparent; border: 1px solid var(--border); color: var(--muted); }

        /* Loading */
        .loading { display: none; text-align: center; padding: 40px; }
        .loading.active { display: block; }
        .spinner {
            width: 40px; height: 40px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Flip<span>Finder</span></div>
    <div class="badge">V2.1 PRO</div>
</div>

<div class="filters">
    <div class="filter-group">
        <label><i data-lucide="tag" size="10"></i> Marque</label>
        <input type="text" id="marque" placeholder="Ex: Nike, Adidas..." value="Nike">
    </div>
    <div class="filter-group">
        <label><i data-lucide="wallet" size="10"></i> Budget Max</label>
        <input type="text" id="budget" placeholder="Ex: 50" value="40€">
    </div>
    <div class="filter-group">
        <label><i data-lucide="shirt" size="10"></i> Type</label>
        <input type="text" id="type" value="Veste">
    </div>
    <div class="filter-group">
        <label><i data-lucide="maximize" size="10"></i> Taille</label>
        <input type="text" id="taille" value="M">
    </div>
</div>

<button class="btn-scan" id="scanBtn" onclick="lancerScan()">
    <i data-lucide="search"></i> ANALYSER LE MARCHÉ
</button>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="color: var(--muted); font-size: 13px;">Extraction des données en cours...</p>
</div>

<div class="stats-bar" id="statsBar">
    <div class="stat">
        <div class="stat-val" id="statCount">0</div>
        <div class="stat-label">Pépites</div>
    </div>
    <div class="stat">
        <div class="stat-val" id="statMargin">0%</div>
        <div class="stat-label">ROI Max</div>
    </div>
    <div class="stat">
        <div class="stat-val" id="statProfit">0€</div>
        <div class="stat-label">Profit Net</div>
    </div>
</div>

<div id="results"></div>

<script>
// Initialisation des icônes
lucide.createIcons();

function lancerScan() {
    // Nettoyage de l'input budget (enlève le € si présent)
    let budgetRaw = document.getElementById('budget').value;
    const budgetNum = parseInt(budgetRaw.replace(/[^0-9]/g, '')) || 30;
    const marque = document.getElementById('marque').value || "Article";
    const type = document.getElementById('type').value;

    // Reset UI
    document.getElementById('results').innerHTML = '';
    document.getElementById('statsBar').style.display = 'none';
    document.getElementById('loading').classList.add('active');
    document.getElementById('scanBtn').disabled = true;

    setTimeout(() => {
        const items = [];
        for(let i=0; i<5; i++) {
            const buyPrice = Math.floor(budgetNum * (0.4 + Math.random() * 0.4));
            const sellPrice = Math.floor(buyPrice * (1.8 + Math.random() * 0.8));
            
            // Calcul des frais (Vinted : 0.70€ + 5%)
            const fraisVinted = 0.70 + (buyPrice * 0.05);
            const profitNet = Math.round(sellPrice - buyPrice - fraisVinted);
            const roi = Math.round((profitNet / buyPrice) * 100);

            items.push({
                title: `${marque} ${type} Vintage Edition`,
                brand: marque,
                buy: buyPrice,
                sell: sellPrice,
                profit: profitNet,
                roi: roi,
                photo: `https://picsum.photos/seed/${marque}${i}${Date.now()}/220/280`
            });
        }

        render(items);
        document.getElementById('loading').classList.remove('active');
        document.getElementById('scanBtn').disabled = false;
        lucide.createIcons(); // Re-render les icônes dans les cartes
    }, 1200);
}

function render(items) {
    const container = document.getElementById('results');
    const bar = document.getElementById('statsBar');
    bar.style.display = 'flex';
    
    // Calcul des stats globales
    const maxRoi = Math.max(...items.map(i => i.roi));
    const avgProfit = Math.round(items.reduce((acc, i) => acc + i.profit, 0) / items.length);

    document.getElementById('statCount').textContent = items.length;
    document.getElementById('statMargin').textContent = maxRoi + '%';
    document.getElementById('statProfit').textContent = avgProfit + '€';

    items.forEach((item, i) => {
        container.innerHTML += `
            <div class="card" style="animation-delay: ${i * 0.1}s">
                <div class="card-top">
                    <div class="card-photo">
                        <img src="${item.photo}" onload="this.classList.add('loaded')">
                    </div>
                    <div class="card-info">
                        <div class="card-brand">${item.brand}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="price-container">
                            <span class="price-buy">${item.buy}€</span>
                            <span class="price-sell">${item.sell}€</span>
                        </div>
                        <div>
                            <span class="profit-tag">
                                <i data-lucide="trending-up" size="12"></i>
                                +${item.profit}€ net (ROI ${item.roi}%)
                            </span>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <a href="#" class="btn-action btn-vinted">
                        <i data-lucide="external-link" size="14"></i> ACHETER
                    </a>
                    <a href="#" class="btn-action btn-lbc">
                        <i data-lucide="bar-chart-3" size="14"></i> ANALYSER
                    </a>
                </div>
            </div>`;
    });
}
</script>
</body>
</html>
